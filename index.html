<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e17">
<title>Progress Tracker</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0e17;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow-x:hidden}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0a0e17}::-webkit-scrollbar-thumb{background:#1e2640;border-radius:4px}input,textarea,button{font-family:inherit}input:disabled,textarea:disabled{opacity:0.6}@keyframes todayGlow{0%,100%{box-shadow:0 0 8px rgba(100,255,218,0.15)}50%{box-shadow:0 0 14px rgba(100,255,218,0.3)}}</style>
</head>
<body>
<div id="root"></div>
<div id="fallback" style="display:none;color:#64ffda;text-align:center;padding:60px 20px;font-family:sans-serif;"><p style="font-size:24px;margin-bottom:12px;">⏳ Loading...</p><p style="color:#7c8aa0;font-size:14px;">If this stays, check console for errors.</p></div>
<script>setTimeout(function(){if(!document.getElementById('root').children.length){document.getElementById('fallback').style.display='block';}},8000);</script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const{useState,useEffect,useCallback,useMemo,createContext,useContext}=React;

const C={bg:'#0a0e17',card:'#13182a',border:'#1e2640',inputBg:'#181f35',text:'#e2e8f0',sub:'#7c8aa0',accent:'#64ffda',danger:'#ff6b6b'};
const MOODS=['😊','😐','😔','😡','😴','🤩'];
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const JOURNAL_PROMPTS=['What went well today?','What did you learn?','What are you grateful for?','How can tomorrow be better?','One highlight from today...','What challenged you?','Something that made you smile...'];
const CATEGORY_COLORS=['#10b981','#8b5cf6','#f59e0b','#3b82f6','#ef4444','#ec4899','#06b6d4','#84cc16'];
const DEFAULT_CATEGORIES=[
{id:'fitness',name:'Fitness Tracker',icon:'💪',color:'#10b981',days:7,tasks:['Do Workout','Log Meal 1','Log Meal 2','Log Meal 3','Hit Calories Intake','Hit Protein Intake']},
{id:'emotional',name:'Emotional Growth',icon:'🧠',color:'#8b5cf6',days:7,tasks:['Write Growth Journal','Talk to Family / Friend','Play any Match']},
{id:'financial',name:'Financial Growth',icon:'💰',color:'#f59e0b',days:6,tasks:['Go to Work','Log Hours','Do Next Practical Step']}
];
const GOAL_CATEGORIES=[
{id:'health',name:'Health',icon:'🏋️',color:'#10b981'},
{id:'wealth',name:'Wealth',icon:'💎',color:'#f59e0b'},
{id:'happiness',name:'Happiness',icon:'😊',color:'#8b5cf6'}
];

const SK='pt_pwa_v1';
function getWeekId(date){const d=date||new Date();const target=new Date(d.valueOf());const dayNr=(d.getDay()+6)%7;target.setDate(target.getDate()-dayNr+3);const jan4=new Date(target.getFullYear(),0,4);const dayDiff=(target.getTime()-jan4.getTime())/86400000;const weekNr=1+Math.round((dayDiff-3+((jan4.getDay()+6)%7))/7);return`${target.getFullYear()}-W${String(weekNr).padStart(2,'0')}`}
function getWeekStart(weekId){const p=weekId.split('-W');const y=parseInt(p[0]);const w=parseInt(p[1]);const j=new Date(y,0,4);const jd=(j.getDay()+6)%7;const ws=new Date(j);ws.setDate(j.getDate()-jd+(w-1)*7);return ws}
function getWeekRange(weekId){const s=getWeekStart(weekId);const e=new Date(s);e.setDate(s.getDate()+6);const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return`${s.getDate()} ${m[s.getMonth()]} — ${e.getDate()} ${m[e.getMonth()]}`}
function getTodayIndex(){const d=new Date().getDay();return d===0?6:d-1}
function getAdjacentWeek(weekId,dir){const s=getWeekStart(weekId);s.setDate(s.getDate()+dir*7);return getWeekId(s)}
function initWeekData(cats){const t={};for(const c of cats){t[c.id]={};for(const task of c.tasks)t[c.id][task]=new Array(c.days).fill(false)}return{tasks:t,logs:{},meta:{stars:0,reflection:'',focus:''}}}
function ensureWeek(data,wid){if(!data.weeks[wid])data.weeks[wid]=initWeekData(data.categories);for(const c of data.categories){if(!data.weeks[wid].tasks[c.id])data.weeks[wid].tasks[c.id]={};for(const t of c.tasks){if(!data.weeks[wid].tasks[c.id][t])data.weeks[wid].tasks[c.id][t]=new Array(c.days).fill(false)}}if(!data.weeks[wid].meta)data.weeks[wid].meta={stars:0,reflection:'',focus:''};if(!data.weeks[wid].logs)data.weeks[wid].logs={};return data}
function getCategoryScore(wd,cat){const ct=wd.tasks[cat.id]||{};let d=0,total=0;for(const t of cat.tasks){const a=ct[t]||[];for(let i=0;i<cat.days;i++){total++;if(a[i])d++}}return{done:d,total,pct:total>0?Math.round((d/total)*100):0}}
function getOverallScore(wd,cats){let d=0,t=0;for(const c of cats){const s=getCategoryScore(wd,c);d+=s.done;t+=s.total}return{done:d,total:t,pct:t>0?Math.round((d/t)*100):0}}
const DEFAULT_DAY_LABELS=[{icon:'',label:''},{icon:'',label:''},{icon:'',label:''},{icon:'',label:''},{icon:'',label:''},{icon:'',label:''},{icon:'',label:''}];
function getDefault(){return{categories:DEFAULT_CATEGORIES.map(c=>({...c,tasks:[...c.tasks]})),weeks:{},goals:[],calTarget:2500,dayLabels:DEFAULT_DAY_LABELS.map(d=>({...d}))}}
function loadD(){try{const r=localStorage.getItem(SK);if(r){const d=JSON.parse(r);if(!d.categories||!d.weeks)return getDefault();if(!d.goals)d.goals=[];if(!d.calTarget)d.calTarget=2500;if(!d.dayLabels)d.dayLabels=DEFAULT_DAY_LABELS.map(x=>({...x}));return d}}catch(e){}return getDefault()}
function saveD(d){try{localStorage.setItem(SK,JSON.stringify(d))}catch(e){}}

const DC=createContext(null);
function DP({children}){
const[data,setData]=useState(getDefault);
const[selWeek,setSelWeek]=useState(getWeekId());
const[loaded,setLoaded]=useState(false);
const cw=getWeekId();
const isCW=selWeek===cw;
useEffect(()=>{const d=loadD();ensureWeek(d,cw);setData({...d});saveD(d);setLoaded(true)},[]);

const toggleTask=useCallback((catId,task,dayIdx)=>{setData(prev=>{let nx={...prev,weeks:{...prev.weeks}};ensureWeek(nx,selWeek);const wd={...nx.weeks[selWeek]};if(!wd.tasks[catId])wd.tasks[catId]={};if(!wd.tasks[catId][task]){const c=nx.categories.find(x=>x.id===catId);wd.tasks[catId][task]=new Array(c?.days||7).fill(false)}wd.tasks[catId]={...wd.tasks[catId]};wd.tasks[catId][task]=[...wd.tasks[catId][task]];wd.tasks[catId][task][dayIdx]=!wd.tasks[catId][task][dayIdx];wd.tasks={...wd.tasks};nx.weeks[selWeek]=wd;saveD(nx);return nx})},[selWeek]);
const setMeta=useCallback((k,v)=>{setData(prev=>{const nx={...prev,weeks:{...prev.weeks}};ensureWeek(nx,selWeek);nx.weeks[selWeek]={...nx.weeks[selWeek],meta:{...nx.weeks[selWeek].meta,[k]:v}};saveD(nx);return nx})},[selWeek]);
const setLog=useCallback((di,k,v)=>{setData(prev=>{let nx={...prev,weeks:{...prev.weeks}};ensureWeek(nx,selWeek);const logs={...nx.weeks[selWeek].logs};const ol=logs[di]||{};logs[di]={...ol,[k]:v};nx.weeks[selWeek]={...nx.weeks[selWeek],logs};saveD(nx);return nx})},[selWeek]);
const resetWeek=useCallback(()=>{setData(prev=>{const nx={...prev,weeks:{...prev.weeks}};delete nx.weeks[selWeek];ensureWeek(nx,selWeek);saveD(nx);return nx})},[selWeek]);
const deleteWeek=useCallback((wid)=>{setData(prev=>{const nx={...prev,weeks:{...prev.weeks}};delete nx.weeks[wid];saveD(nx);return nx})},[]);
const updateCats=useCallback((cats)=>{setData(prev=>{const nx={...prev,categories:cats};saveD(nx);return nx})},[]);
const addGoal=useCallback((cat,title,td)=>{setData(prev=>{const g={id:`g_${Date.now()}`,category:cat,title,progress:0,targetDate:td,createdAt:new Date().toISOString(),archived:false};const nx={...prev,goals:[...prev.goals,g]};saveD(nx);return nx})},[]);
const setCalTarget=useCallback((v)=>{setData(prev=>{const nx={...prev,calTarget:v};saveD(nx);return nx})},[]);
const setDayLabels=useCallback((labels)=>{setData(prev=>{const nx={...prev,dayLabels:labels};saveD(nx);return nx})},[]);
const updGoalProg=useCallback((id,delta)=>{setData(prev=>{const goals=prev.goals.map(g=>{if(g.id!==id)return g;const np=Math.max(0,Math.min(100,g.progress+delta));return{...g,progress:np,completedAt:np>=100&&g.progress<100?new Date().toISOString():g.completedAt}});const nx={...prev,goals};saveD(nx);return nx})},[]);
const updGoal=useCallback((id,title,td)=>{setData(prev=>{const goals=prev.goals.map(g=>g.id===id?{...g,title,targetDate:td}:g);const nx={...prev,goals};saveD(nx);return nx})},[]);
const archGoal=useCallback((id)=>{setData(prev=>{const goals=prev.goals.map(g=>g.id===id?{...g,archived:true}:g);const nx={...prev,goals};saveD(nx);return nx})},[]);
const delGoal=useCallback((id)=>{setData(prev=>{const goals=prev.goals.filter(g=>g.id!==id);const nx={...prev,goals};saveD(nx);return nx})},[]);

return React.createElement(DC.Provider,{value:{data,currentWeek:cw,selectedWeek:selWeek,setSelectedWeek:setSelWeek,toggleTask,setMeta,setLog,resetWeek,updateCategories:updateCats,isCurrentWeek:isCW,loaded,deleteWeek,addGoal,updateGoalProgress:updGoalProg,updateGoal:updGoal,archiveGoal:archGoal,deleteGoal:delGoal,calTarget:data.calTarget,setCalTarget,dayLabels:data.dayLabels||DEFAULT_DAY_LABELS,setDayLabels}},children)}
function useD(){const c=useContext(DC);if(!c)throw new Error('wrap');return c}

function PBar({pct,color,height=7}){return(<div style={{height,backgroundColor:'rgba(255,255,255,0.06)',borderRadius:height,overflow:'hidden',width:'100%'}}><div style={{height,borderRadius:height,backgroundColor:color,width:`${pct}%`,transition:'width 0.4s ease'}}/></div>)}
function CirProg({size,sw,progress,color=C.accent}){const r=(size-sw)/2;const circ=2*Math.PI*r;const off=circ-(Math.min(progress,100)/100)*circ;return(<div style={{width:size,height:size,position:'relative',display:'flex',alignItems:'center',justifyContent:'center'}}><svg width={size} height={size} style={{transform:'rotate(-90deg)',position:'absolute'}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={sw}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw} strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round" style={{transition:'stroke-dashoffset 0.5s ease'}}/></svg><span style={{fontSize:size*0.22,fontWeight:800,color:C.text,zIndex:1}}>{progress}%</span></div>)}
function scoreLabel(p){if(p>=75)return'🔥 Crushing it!';if(p>=50)return'✨ Good';if(p>=25)return'💫 Push';return'🎯 Start'}

const sty={sc:{padding:'0 16px'},ld:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:C.accent,fontSize:16},cd:{backgroundColor:C.card,borderRadius:16,padding:16,border:`1px solid ${C.border}`},ib:{backgroundColor:C.inputBg,borderRadius:8,border:`1px solid ${C.border}`,color:C.text,fontSize:14,padding:12,width:'100%',boxSizing:'border-box',outline:'none',fontFamily:'inherit'},fl:{fontSize:12,color:C.sub,marginBottom:6,marginTop:10,textTransform:'uppercase',letterSpacing:0.5},ab:{flex:1,padding:'12px 0',borderRadius:10,backgroundColor:C.card,border:`1px solid ${C.border}`,fontSize:13,fontWeight:600,cursor:'pointer',textAlign:'center'},nb:{flex:1,padding:'10px 0',borderRadius:10,backgroundColor:C.card,border:`1px solid ${C.border}`,color:C.sub,fontSize:12,fontWeight:600,cursor:'pointer',textAlign:'center'},ib2:{background:'none',border:'none',fontSize:18,cursor:'pointer',padding:4},mo:{position:'fixed',top:0,left:0,right:0,bottom:0,backgroundColor:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,padding:20},mc:{backgroundColor:C.card,borderRadius:16,padding:20,border:`1px solid ${C.border}`,width:'100%',maxWidth:400}};

// ===== TRACKER TAB =====
function TrackerTab(){
const{data,selectedWeek:sw,currentWeek:cw,isCurrentWeek:isCW,toggleTask,setMeta,resetWeek,loaded,dayLabels,calTarget}=useD();
const wd=useMemo(()=>{const d={...data};ensureWeek(d,sw);return d.weeks[sw]},[data,sw]);
const ov=useMemo(()=>getOverallScore(wd,data.categories),[wd,data.categories]);
const cs=useMemo(()=>data.categories.map(cat=>({...getCategoryScore(wd,cat),cat})),[wd,data.categories]);
const streak=useMemo(()=>{let c=0,w=cw;while(data.weeks[w]){const s=getOverallScore(data.weeks[w],data.categories);if(s.pct>=50)c++;else break;w=getAdjacentWeek(w,-1)}return c},[data,cw]);
const ti=getTodayIndex();
const handleExport=()=>{const l=[`📊 WEEKLY PROGRESS REPORT`,getWeekRange(sw),'',`Overall: ${ov.done}/${ov.total} (${ov.pct}%)`,''];for(const c of cs){l.push(`${c.cat.icon} ${c.cat.name}: ${c.done}/${c.total} (${c.pct}%)`);for(const t of c.cat.tasks){const a=wd.tasks[c.cat.id]?.[t]||[];l.push(`  ${a.filter(Boolean).length>0?'✅':'⬜'} ${t}: ${a.filter(Boolean).length}/${c.cat.days}`)}l.push('')}navigator.clipboard?.writeText(l.join('\n')).then(()=>alert('Copied!')).catch(()=>alert(l.join('\n')))};
const handleShareClaude=()=>{const l=[];l.push(`📊 PROGRESS TRACKER — WEEK REPORT`);l.push(`Week: ${sw} (${getWeekRange(sw)})`);l.push(`Overall Score: ${ov.done}/${ov.total} (${ov.pct}%)`);if(streak>0)l.push(`Week Streak: ${streak} weeks`);l.push('');l.push('═══ CATEGORY BREAKDOWN ═══');for(const c of cs){l.push(`\n${c.cat.icon} ${c.cat.name}: ${c.pct}% (${c.done}/${c.total})`);for(const t of c.cat.tasks){const a=wd.tasks[c.cat.id]?.[t]||[];const done=[];for(let i=0;i<c.cat.days;i++){if(a[i])done.push(DAYS[i])}l.push(`  ${done.length>0?'✅':'⬜'} ${t}: ${done.length}/${c.cat.days}${done.length>0?' ('+done.join(',')+')':''}`)}}l.push('\n═══ DAILY LOGS ═══');const logs=wd.logs||{};for(let i=0;i<7;i++){const log=logs[i]||{};const dl=(dayLabels||[])[i]||{};const parts=[DAYS[i]];if(dl.icon||dl.label)parts.push(`${dl.icon||''} ${dl.label||''}`.trim());const details=[];if(log.mood!==undefined)details.push(`Mood:${MOODS[log.mood]}`);if(log.energy!==undefined)details.push(`Energy:${log.energy+1}/5`);if(log.calories!==undefined){const diff=log.calories-calTarget;details.push(`Cal:${log.calories}(${diff>=0?'+':''}${diff})`)}if(log.money>0)details.push(`Saved:$${log.money}`);if(details.length>0)parts.push('→ '+details.join(' | '));if(log.note)parts.push(`\n    Journal: "${log.note}"`);if(details.length>0||log.note)l.push(parts.join(' '))}l.push('\n═══ WEEKLY REFLECTION ═══');if(wd.meta.stars)l.push(`Self-rating: ${'⭐'.repeat(wd.meta.stars)} (${wd.meta.stars}/5)`);if(wd.meta.reflection)l.push(`Reflection: "${wd.meta.reflection}"`);if(wd.meta.focus)l.push(`Next week focus: "${wd.meta.focus}"`);const goals=(data.goals||[]).filter(g=>!g.archived);if(goals.length>0){l.push('\n═══ ACTIVE GOALS ═══');for(const g of goals){const gc=GOAL_CATEGORIES.find(c=>c.id===g.category);const dl2=Math.ceil((new Date(g.targetDate).getTime()-new Date().getTime())/86400000);const totalD=Math.max(1,Math.ceil((new Date(g.targetDate).getTime()-new Date(g.createdAt).getTime())/86400000));const elapsed=Math.min(totalD,Math.max(0,Math.ceil((new Date().getTime()-new Date(g.createdAt).getTime())/86400000)));l.push(`${gc?.icon||'🎯'} ${g.title}: Day ${elapsed}/${totalD} (${dl2>=0?dl2+' days left':'overdue'})`)}}const txt=l.join('\n');navigator.clipboard?.writeText(txt).then(()=>alert('Copied! Paste this in Claude chat')).catch(()=>{prompt('Copy this text:',txt)})};
if(!loaded)return <div style={sty.ld}>Loading...</div>;
return(<div style={sty.sc}>
<div style={{paddingTop:12,paddingBottom:8}}><h1 style={{fontSize:22,fontWeight:700,color:C.text,margin:0}}>All-in-1 Progress Tracker</h1><p style={{fontSize:13,color:C.sub,margin:'4px 0 0'}}>📍 {isCW?'Current Week':sw} • {getWeekRange(sw)}</p></div>
<div style={{...sty.cd,display:'flex',alignItems:'center',gap:16,marginTop:12}}><div style={{flex:1}}><p style={{fontSize:12,color:C.sub,textTransform:'uppercase',letterSpacing:1,margin:0}}>Weekly Score</p><p style={{fontSize:36,fontWeight:800,color:C.text,margin:'4px 0'}}>{ov.done}<span style={{fontSize:20,fontWeight:400,color:C.sub}}>/{ov.total}</span></p>{streak>0&&<p style={{fontSize:12,color:C.accent,margin:0}}>🔥 {streak} week streak!</p>}<div style={{display:'flex',gap:12,marginTop:8}}>{cs.map(c=><div key={c.cat.id} style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:8,height:8,borderRadius:4,backgroundColor:c.cat.color}}/><span style={{fontSize:11,color:C.sub}}>{c.pct}%</span></div>)}</div></div><CirProg size={80} sw={6} progress={ov.pct}/></div>
{ov.pct>=80&&isCW&&<div style={{backgroundColor:'#64ffda18',borderRadius:12,padding:12,marginTop:12,textAlign:'center',border:`1px solid ${C.accent}`}}><span style={{fontSize:14,color:C.accent,fontWeight:600}}>🎉 Amazing week! You're crushing it! 🎉</span></div>}
{data.categories.map((cat,ci)=>{const sc=cs[ci];return(<div key={cat.id} style={{...sty.cd,marginTop:14}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}><div><span style={{fontSize:16,fontWeight:600,color:C.text}}>{cat.icon} <span style={{color:cat.color}}>{cat.name}</span></span><p style={{fontSize:11,color:C.sub,margin:'2px 0 0'}}>{cat.days} days • {cat.tasks.length} tasks/day</p></div><div style={{textAlign:'right'}}><p style={{fontSize:22,fontWeight:700,color:cat.color,margin:0}}>{sc.pct}%</p><p style={{fontSize:11,color:C.sub,margin:0}}>{sc.done}/{sc.total}</p></div></div><PBar pct={sc.pct} color={cat.color}/><div style={{overflowX:'auto',marginTop:12}}><table style={{borderCollapse:'collapse',minWidth:'100%'}}><thead><tr><th style={{textAlign:'left',fontSize:10,color:C.sub,fontWeight:600,padding:'4px 8px 4px 0',minWidth:100}}>Task</th>{DAYS.slice(0,cat.days).map((d,i)=>{const isToday=ti===i&&isCW;return<th key={i} style={{fontSize:10,color:isToday?C.accent:C.sub,fontWeight:isToday?700:600,padding:'4px 2px',minWidth:36,textAlign:'center',position:'relative',borderBottom:isToday?'2px solid #64ffda':'none'}}>{d}{isToday&&<span style={{display:'block',fontSize:7,color:C.accent,marginTop:1,letterSpacing:0.5}}>TODAY</span>}</th>})}</tr></thead><tbody>{cat.tasks.map(task=><tr key={task}><td style={{fontSize:11,color:C.text,padding:'3px 8px 3px 0',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:110}}>{task}</td>{Array.from({length:cat.days},(_,di)=>{const chk=wd.tasks[cat.id]?.[task]?.[di]||false;const isToday=di===ti&&isCW;return<td key={di} style={{textAlign:'center',padding:'3px 2px',backgroundColor:isToday?'rgba(100,255,218,0.04)':'transparent',borderRadius:isToday?6:0}}><button onClick={()=>isCW&&toggleTask(cat.id,task,di)} disabled={!isCW} style={{width:26,height:26,borderRadius:6,border:`1.5px solid ${chk?cat.color:isToday?'#64ffda50':C.border}`,backgroundColor:chk?cat.color:isToday?'#64ffda08':C.inputBg,cursor:isCW?'pointer':'default',opacity:isCW?1:0.5,display:'inline-flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:14,fontWeight:700,transition:'all 0.15s ease',animation:isToday&&!chk?'todayGlow 3s ease-in-out infinite':'none'}}>{chk?'✓':''}</button></td>})}</tr>)}</tbody></table></div></div>)})}
<div style={{...sty.cd,marginTop:14}}><h3 style={{fontSize:18,fontWeight:600,color:C.text,margin:'0 0 12px'}}>📝 Weekly Summary</h3>{cs.map(c=><div key={c.cat.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',borderLeft:`3px solid ${c.cat.color}`,paddingLeft:10,paddingTop:8,paddingBottom:8,marginBottom:6}}><span style={{fontSize:13,color:C.text}}>{c.cat.icon} {c.cat.name}</span><div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:11,color:C.sub}}>{c.done}/{c.total}</span><span style={{backgroundColor:c.cat.color+'18',color:c.cat.color,padding:'3px 8px',borderRadius:8,fontSize:11,fontWeight:600}}>{scoreLabel(c.pct)}</span></div></div>)}<p style={{fontSize:12,color:C.sub,marginTop:14,marginBottom:6}}>Rate your week:</p><div style={{display:'flex',gap:4}}>{[1,2,3,4,5].map(s=><button key={s} onClick={()=>isCW&&setMeta('stars',s)} style={{fontSize:24,opacity:wd.meta.stars>=s?1:0.3,padding:8,background:'none',border:'none',cursor:'pointer'}}>⭐</button>)}</div><p style={{fontSize:12,color:C.sub,marginTop:14,marginBottom:6}}>Weekly reflection:</p><textarea style={{...sty.ib,minHeight:80,resize:'vertical'}} placeholder="How was your week? Kya seekha?..." value={wd.meta.reflection} onChange={e=>setMeta('reflection',e.target.value)} disabled={!isCW}/><p style={{fontSize:12,color:C.sub,marginTop:14,marginBottom:6}}>🎯 Next week's focus:</p><input style={sty.ib} placeholder="One priority for next week..." value={wd.meta.focus} onChange={e=>setMeta('focus',e.target.value)} disabled={!isCW}/></div>
<div style={{display:'flex',gap:10,marginTop:16,marginBottom:8}}><button onClick={()=>{if(confirm('Clear all data for this week?'))resetWeek()}} style={{...sty.ab,borderColor:C.danger,color:C.danger}}>🔄 Reset</button><button onClick={handleExport} style={{...sty.ab,borderColor:C.accent,color:C.accent}}>📤 Export</button></div>

// ===== HISTORY & GOALS =====
function HistoryTab(){
const{data,selectedWeek:sw,setSelectedWeek:setSW,currentWeek:cw,loaded,deleteWeek,addGoal,updateGoal:updG,archiveGoal:archG,deleteGoal:delG}=useD();
const[showGF,setShowGF]=useState(false);const[gCat,setGCat]=useState('health');const[gTitle,setGTitle]=useState('');const[gDate,setGDate]=useState('');const[editG,setEditG]=useState(null);const[showArch,setShowArch]=useState(false);
const sorted=useMemo(()=>Object.keys(data.weeks).sort().reverse(),[data.weeks]);
const active=useMemo(()=>data.goals.filter(g=>!g.archived),[data.goals]);
const archived=useMemo(()=>data.goals.filter(g=>g.archived),[data.goals]);
const daysLeft=(ds)=>Math.ceil((new Date(ds).getTime()-new Date().getTime())/86400000);
const autoProgress=(g)=>{const created=new Date(g.createdAt);const target=new Date(g.targetDate);const now=new Date();const totalDays=Math.max(1,Math.ceil((target.getTime()-created.getTime())/86400000));const elapsed=Math.ceil((now.getTime()-created.getTime())/86400000);return Math.min(100,Math.max(0,Math.round((elapsed/totalDays)*100)))};
const handleAdd=()=>{if(!gTitle.trim()){alert('Enter a goal title');return}if(!gDate.trim()){alert('Enter a target date');return}if(editG)updG(editG,gTitle.trim(),gDate.trim());else addGoal(gCat,gTitle.trim(),gDate.trim());setGTitle('');setGDate('');setShowGF(false);setEditG(null)};
if(!loaded)return <div style={sty.ld}>Loading...</div>;
return(<div style={sty.sc}><h1 style={{fontSize:22,fontWeight:700,color:C.text,margin:0,paddingTop:12,marginBottom:6}}>📊 History & Goals</h1>
<p style={{fontSize:13,fontWeight:700,color:C.accent,letterSpacing:1,textTransform:'uppercase',margin:'8px 0 10px'}}>🎯 MY GOALS</p>
{GOAL_CATEGORIES.map(gc=>{const goal=active.find(g=>g.category===gc.id);if(!goal)return<button key={gc.id} onClick={()=>{setGCat(gc.id);setEditG(null);setGTitle('');setGDate('');setShowGF(true)}} style={{...sty.cd,display:'flex',alignItems:'center',gap:10,marginBottom:8,border:`1px dashed ${gc.color}40`,cursor:'pointer',width:'100%',textAlign:'left'}}><span style={{fontSize:24}}>{gc.icon}</span><span style={{fontSize:14,fontWeight:600,color:gc.color}}>Set {gc.name} Goal</span></button>;const dl=daysLeft(goal.targetDate);const prog=autoProgress(goal);const totalDays=Math.max(1,Math.ceil((new Date(goal.targetDate).getTime()-new Date(goal.createdAt).getTime())/86400000));const elapsed=Math.min(totalDays,Math.max(0,Math.ceil((new Date().getTime()-new Date(goal.createdAt).getTime())/86400000)));return(<div key={goal.id} style={{...sty.cd,marginBottom:10,borderLeft:`4px solid ${gc.color}`}}><div style={{display:'flex',justifyContent:'space-between'}}><div><p style={{fontSize:11,color:C.sub,margin:0}}>{gc.icon} {gc.name}</p><p style={{fontSize:16,fontWeight:600,color:C.text,margin:'2px 0'}}>{goal.title}</p><p style={{fontSize:12,color:dl<0?C.danger:dl<=7?'#f59e0b':C.accent,margin:0}}>{dl>=0?`${dl} days left`:`${Math.abs(dl)} days overdue`}</p></div><div style={{display:'flex',gap:12}}><button onClick={()=>{setEditG(goal.id);setGCat(goal.category);setGTitle(goal.title);setGDate(goal.targetDate);setShowGF(true)}} style={sty.ib2}>✏️</button><button onClick={()=>{if(confirm('Archive?'))archG(goal.id)}} style={sty.ib2}>📦</button></div></div><div style={{display:'flex',alignItems:'center',gap:8,marginTop:10}}><div style={{flex:1}}><PBar pct={prog} color={gc.color} height={8}/></div><span style={{fontSize:14,fontWeight:700,color:gc.color,minWidth:40,textAlign:'right'}}>{prog}%</span></div><p style={{fontSize:11,color:C.sub,margin:'6px 0 0'}}>Day {elapsed} of {totalDays}</p>{prog>=100&&<p style={{fontSize:13,fontWeight:600,color:C.accent,marginTop:6,textAlign:'center'}}>⏰ Deadline reached!</p>}</div>)})}
{archived.length>0&&<button onClick={()=>setShowArch(!showArch)} style={{background:'none',border:'none',color:C.sub,fontSize:13,cursor:'pointer',padding:'10px 0',width:'100%',textAlign:'center'}}>📜 Goal History ({archived.length}) {showArch?'▲':'▼'}</button>}
{showArch&&archived.map(g=>{const ci=GOAL_CATEGORIES.find(c=>c.id===g.category)||GOAL_CATEGORIES[0];return<div key={g.id} style={{...sty.cd,marginBottom:6,borderLeft:`3px solid ${ci.color}`,opacity:0.7}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><p style={{fontSize:10,color:C.sub,margin:0}}>{ci.icon} {ci.name}</p><p style={{fontSize:14,color:C.text,margin:0}}>{g.title}</p><p style={{fontSize:10,color:C.sub,margin:'2px 0 0'}}>{g.progress}%</p></div><button onClick={()=>delG(g.id)} style={sty.ib2}>🗑</button></div></div>})}
<p style={{fontSize:13,fontWeight:700,color:C.accent,letterSpacing:1,textTransform:'uppercase',margin:'24px 0 10px'}}>📅 WEEK HISTORY</p>
<div style={{display:'flex',gap:8,marginBottom:12}}><button onClick={()=>setSW(getAdjacentWeek(sw,-1))} style={sty.nb}>◀ Prev</button><button onClick={()=>setSW(cw)} style={{...sty.nb,borderColor:C.accent,color:C.accent}}>Current</button><button onClick={()=>setSW(getAdjacentWeek(sw,1))} style={sty.nb}>Next ▶</button></div>
{sorted.length===0?<div style={{textAlign:'center',paddingTop:30}}><p style={{fontSize:36}}>📅</p><p style={{fontSize:16,fontWeight:600,color:C.text}}>No history yet</p></div>:sorted.map(wid=>{const w=data.weeks[wid];const o=getOverallScore(w,data.categories);const isC=wid===cw;const isS=wid===sw;return(<div key={wid} style={{...sty.cd,marginBottom:10,borderColor:isS?C.accent:isC?'#64ffda60':C.border}}><div style={{display:'flex',justifyContent:'space-between'}}><div onClick={()=>setSW(wid)} style={{cursor:'pointer',flex:1}}><div style={{display:'flex',alignItems:'center',gap:6}}><span style={{fontSize:14,fontWeight:700,color:C.text}}>{wid}</span>{isC&&<span style={{backgroundColor:C.accent,color:C.bg,padding:'2px 6px',borderRadius:4,fontSize:9,fontWeight:700}}>CURRENT</span>}</div><p style={{fontSize:12,color:C.sub,margin:'2px 0 0'}}>{getWeekRange(wid)}</p></div><div style={{textAlign:'right'}}><p style={{fontSize:22,fontWeight:700,color:o.pct>=50?C.accent:C.text,margin:0}}>{o.pct}%</p><button onClick={()=>{if(confirm(`Delete ${wid}?`))deleteWeek(wid)}} style={sty.ib2}>🗑</button></div></div><div style={{marginTop:6}}>{data.categories.map(cat=>{const s=getCategoryScore(w,cat);return<div key={cat.id} style={{display:'flex',alignItems:'center',gap:6,marginTop:4}}><span style={{fontSize:12,width:18}}>{cat.icon}</span><div style={{flex:1}}><PBar pct={s.pct} color={cat.color} height={6}/></div><span style={{fontSize:10,fontWeight:600,color:cat.color,minWidth:30,textAlign:'right'}}>{s.pct}%</span></div>})}</div></div>)})}
{showGF&&<div style={sty.mo} onClick={()=>{setShowGF(false);setEditG(null)}}><div style={sty.mc} onClick={e=>e.stopPropagation()}><h3 style={{fontSize:18,fontWeight:700,color:C.text,margin:'0 0 12px'}}>{editG?'✏️ Edit Goal':'🎯 New Goal'}</h3>{!editG&&<><p style={sty.fl}>CATEGORY</p><div style={{display:'flex',gap:8}}>{GOAL_CATEGORIES.map(gc=><button key={gc.id} onClick={()=>setGCat(gc.id)} style={{flex:1,padding:'10px 0',borderRadius:10,backgroundColor:gCat===gc.id?gc.color+'20':C.inputBg,border:`1px solid ${gCat===gc.id?gc.color:C.border}`,textAlign:'center',cursor:'pointer'}}><p style={{fontSize:20,margin:0}}>{gc.icon}</p><p style={{fontSize:10,color:gCat===gc.id?gc.color:C.sub,margin:'2px 0 0'}}>{gc.name}</p></button>)}</div></>}<p style={sty.fl}>GOAL TITLE</p><input style={sty.ib} placeholder="e.g., Lose 10kg, Save $5000" value={gTitle} onChange={e=>setGTitle(e.target.value)}/><p style={sty.fl}>TARGET DATE</p><input type="date" style={sty.ib} value={gDate} onChange={e=>setGDate(e.target.value)}/><div style={{display:'flex',gap:10,marginTop:16}}><button onClick={()=>{setShowGF(false);setEditG(null)}} style={{flex:1,padding:12,borderRadius:8,backgroundColor:C.inputBg,border:'none',color:C.sub,fontSize:14,fontWeight:600,cursor:'pointer'}}>Cancel</button><button onClick={handleAdd} style={{flex:2,padding:12,borderRadius:8,backgroundColor:C.accent,border:'none',color:C.bg,fontSize:14,fontWeight:700,cursor:'pointer'}}>{editG?'Update':'Set Goal'}</button></div></div></div>}
<div style={{height:40}}/></div>)}

<p style={{fontSize:13,color:C.text,fontWeight:600,marginBottom:4}}>📁 Auto-Backup to Folder</p>
<p style={{fontSize:11,color:C.sub,marginBottom:10}}>Select a folder once, then one-tap backup every time.</p>
<button onClick={async()=>{try{if(!window.showDirectoryPicker){alert('Your browser does not support folder selection. Use Download Backup instead.');return}const dirHandle=await window.showDirectoryPicker({mode:'readwrite'});window._backupDir=dirHandle;alert('✅ Folder selected: '+dirHandle.name+'\nNow use Quick Backup button!')}catch(e){if(e.name!=='AbortError')alert('Error: '+e.message)}}} style={{width:'100%',padding:12,borderRadius:8,backgroundColor:'#3b82f620',border:'1px solid #3b82f6',color:'#3b82f6',fontSize:14,fontWeight:700,cursor:'pointer',marginBottom:8}}>📁 Select Backup Folder</button>
<button onClick={async()=>{try{const raw=localStorage.getItem(SK);if(!raw){alert('No data found!');return}if(window._backupDir){const fname=`progress-tracker-backup-${new Date().toISOString().split('T')[0]}.json`;const fileHandle=await window._backupDir.getFileHandle(fname,{create:true});const writable=await fileHandle.createWritable();await writable.write(raw);await writable.close();alert('✅ Saved to: '+window._backupDir.name+'/'+fname)}else{const blob=new Blob([raw],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`progress-tracker-backup-${new Date().toISOString().split('T')[0]}.json`;a.click();URL.revokeObjectURL(url);alert('✅ Downloaded! (Select a folder first for auto-save)')}}catch(e){alert('Error: '+e.message)}}} style={{width:'100%',padding:14,borderRadius:8,backgroundColor:'#10b98120',border:'1px solid #10b981',color:'#10b981',fontSize:15,fontWeight:700,cursor:'pointer',marginBottom:14}}>💾 Quick Backup</button>
<p style={{fontSize:13,color:C.text,fontWeight:600,marginBottom:4}}>📤 Restore Data</p>
<p style={{fontSize:11,color:C.sub,marginBottom:10}}>Load data from a backup file. This will replace all current data.</p>
<button onClick={()=>{const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=(e)=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=(ev)=>{try{const d=JSON.parse(ev.target.result);if(!d.categories||!d.weeks){alert('Invalid backup file!');return}if(!confirm('This will replace ALL current data. Are you sure?'))return;localStorage.setItem(SK,JSON.stringify(d));window.location.reload()}catch(err){alert('Error reading file: '+err.message)}};reader.readAsText(file)};inp.click()}} style={{width:'100%',padding:12,borderRadius:8,backgroundColor:'#f59e0b20',border:'1px solid #f59e0b',color:'#f59e0b',fontSize:14,fontWeight:700,cursor:'pointer'}}>📤 Restore from Backup</button>
</div>
<div style={{height:60}}/></div>)}

// ===== MAIN APP =====
const TABS=[{id:'tracker',label:'📊 Tracker'},{id:'dailylog',label:'📋 Log'},{id:'history',label:'📅 History'}];
function App(){
const[tab,setTab]=useState('tracker');
const[showS,setShowS]=useState(false);
return(<DP><div style={{minHeight:'100vh',backgroundColor:C.bg,color:C.text,maxWidth:480,margin:'0 auto',position:'relative',display:'flex',flexDirection:'column'}}><div style={{flex:1,overflow:'auto',paddingBottom:70}}>{showS?<SettingsPanel onClose={()=>setShowS(false)}/>:<>{tab==='tracker'&&<TrackerTab/>}{tab==='dailylog'&&<DailyLogTab/>}{tab==='history'&&<HistoryTab/>}</>}</div>
{!showS&&<button onClick={()=>setShowS(true)} style={{position:'fixed',bottom:76,right:'calc(50% - 220px)',width:44,height:44,borderRadius:22,backgroundColor:C.card,border:`1px solid ${C.border}`,color:C.sub,fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',zIndex:50,boxShadow:'0 2px 8px rgba(0,0,0,0.3)'}}>⚙️</button>}
<div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:480,display:'flex',backgroundColor:'#0d1220',borderTop:`1px solid ${C.border}`,paddingBottom:'max(10px, env(safe-area-inset-bottom, 10px))',zIndex:100}}>{TABS.map(t=><button key={t.id} onClick={()=>{setTab(t.id);setShowS(false)}} style={{flex:1,padding:'14px 0',background:'none',border:'none',color:tab===t.id&&!showS?C.accent:C.sub,fontSize:14,fontWeight:tab===t.id&&!showS?700:500,cursor:'pointer',transition:'color 0.2s'}}>{t.label}</button>)}</div>
</div></DP>)}

try{ReactDOM.createRoot(document.getElementById('root')).render(<App/>);document.getElementById('fallback').style.display='none'}catch(e){document.getElementById('fallback').innerHTML='<p style="font-size:20px;color:#ff6b6b;">Error loading app</p><p style="color:#7c8aa0;font-size:13px;margin-top:8px;">'+e.message+'</p>';document.getElementById('fallback').style.display='block';console.error(e)}
</script>
</body>
</html>
