<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e17">
<title>Progress Tracker</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0e17;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow-x:hidden}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0a0e17}::-webkit-scrollbar-thumb{background:#1e2640;border-radius:4px}input,textarea,button{font-family:inherit}input:disabled,textarea:disabled{opacity:0.6}</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@19/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@19/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useCallback,useMemo,createContext,useContext}=React;

const C={bg:'#0a0e17',card:'#13182a',border:'#1e2640',inputBg:'#181f35',text:'#e2e8f0',sub:'#7c8aa0',accent:'#64ffda',danger:'#ff6b6b'};
const MOODS=['😊','😐','😔','😡','😴','🤩'];
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const JOURNAL_PROMPTS=['What went well today?','What did you learn?','What are you grateful for?','How can tomorrow be better?','One highlight from today...','What challenged you?','Something that made you smile...'];
const CATEGORY_COLORS=['#10b981','#8b5cf6','#f59e0b','#3b82f6','#ef4444','#ec4899','#06b6d4','#84cc16'];
const DEFAULT_CATEGORIES=[
{id:'fitness',name:'Fitness Tracker',icon:'💪',color:'#10b981',days:7,tasks:['Do Workout','Log Meal 1','Log Meal 2','Log Meal 3','Hit Calories Intake','Hit Protein Intake']},
{id:'emotional',name:'Emotional Growth',icon:'🧠',color:'#8b5cf6',days:7,tasks:['Write Growth Journal','Talk to Family / Friend','Play any Match']},
{id:'financial',name:'Financial Growth',icon:'💰',color:'#f59e0b',days:6,tasks:['Go to Work','Log Hours','Do Next Practical Step']}
];
const RANKS=[
{min:1,max:5,name:'E-Rank',title:'Beginner Hunter',color:'#6b7280',icon:'🗡️'},
{min:6,max:12,name:'D-Rank',title:'Apprentice Hunter',color:'#10b981',icon:'⚔️'},
{min:13,max:20,name:'C-Rank',title:'Skilled Hunter',color:'#3b82f6',icon:'🛡️'},
{min:21,max:30,name:'B-Rank',title:'Elite Hunter',color:'#8b5cf6',icon:'🏹'},
{min:31,max:42,name:'A-Rank',title:'Master Hunter',color:'#f59e0b',icon:'👑'},
{min:43,max:999,name:'S-Rank',title:'Shadow Monarch',color:'#ef4444',icon:'🔥'}
];
const getRank=(level)=>RANKS.find(r=>level>=r.min&&level<=r.max)||RANKS[0];
const XP_PER_TASK=10,XP_PER_LEVEL=100;
const RANDOM_CHALLENGES=[
{title:'📝 Journal Master',desc:'Write in your journal 5 days',target:5,subType:'journal'},
{title:'💰 Savings Sprint',desc:'Save money 4 days this week',target:4,subType:'savings'},
{title:'😊 Mood Logger',desc:'Log mood every day this week',target:7,subType:'mood'},
{title:'💪 Perfect Day',desc:'Complete ALL tasks in one day',target:1,subType:'perfectDay'},
{title:'⚡ Energy Tracker',desc:'Log energy level 5 days',target:5,subType:'energy'}
];
const GOAL_CATEGORIES=[
{id:'health',name:'Health',icon:'🏋️',color:'#10b981'},
{id:'wealth',name:'Wealth',icon:'💎',color:'#f59e0b'},
{id:'happiness',name:'Happiness',icon:'😊',color:'#8b5cf6'}
];

const SK='pt_pwa_v1';
function getWeekId(date){const d=date||new Date();const target=new Date(d.valueOf());const dayNr=(d.getDay()+6)%7;target.setDate(target.getDate()-dayNr+3);const jan4=new Date(target.getFullYear(),0,4);const dayDiff=(target.getTime()-jan4.getTime())/86400000;const weekNr=1+Math.round((dayDiff-3+((jan4.getDay()+6)%7))/7);return`${target.getFullYear()}-W${String(weekNr).padStart(2,'0')}`}
function getWeekStart(weekId){const p=weekId.split('-W');const y=parseInt(p[0]);const w=parseInt(p[1]);const j=new Date(y,0,4);const jd=(j.getDay()+6)%7;const ws=new Date(j);ws.setDate(j.getDate()-jd+(w-1)*7);return ws}
function getWeekRange(weekId){const s=getWeekStart(weekId);const e=new Date(s);e.setDate(s.getDate()+6);const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return`${s.getDate()} ${m[s.getMonth()]} — ${e.getDate()} ${m[e.getMonth()]}`}
function getTodayIndex(){const d=new Date().getDay();return d===0?6:d-1}
function getAdjacentWeek(weekId,dir){const s=getWeekStart(weekId);s.setDate(s.getDate()+dir*7);return getWeekId(s)}
function initWeekData(cats){const t={};for(const c of cats){t[c.id]={};for(const task of c.tasks)t[c.id][task]=new Array(c.days).fill(false)}return{tasks:t,logs:{},meta:{stars:0,reflection:'',focus:''}}}
function ensureWeek(data,wid){if(!data.weeks[wid])data.weeks[wid]=initWeekData(data.categories);for(const c of data.categories){if(!data.weeks[wid].tasks[c.id])data.weeks[wid].tasks[c.id]={};for(const t of c.tasks){if(!data.weeks[wid].tasks[c.id][t])data.weeks[wid].tasks[c.id][t]=new Array(c.days).fill(false)}}if(!data.weeks[wid].meta)data.weeks[wid].meta={stars:0,reflection:'',focus:''};if(!data.weeks[wid].logs)data.weeks[wid].logs={};return data}
function getCategoryScore(wd,cat){const ct=wd.tasks[cat.id]||{};let d=0,total=0;for(const t of cat.tasks){const a=ct[t]||[];for(let i=0;i<cat.days;i++){total++;if(a[i])d++}}return{done:d,total,pct:total>0?Math.round((d/total)*100):0}}
function getOverallScore(wd,cats){let d=0,t=0;for(const c of cats){const s=getCategoryScore(wd,c);d+=s.done;t+=s.total}return{done:d,total:t,pct:t>0?Math.round((d/t)*100):0}}
function calcXP(data){let xp=0;for(const wid of Object.keys(data.weeks)){const wd=data.weeks[wid];for(const c of data.categories){const ct=wd.tasks[c.id]||{};for(const t of c.tasks){const a=ct[t]||[];for(let i=0;i<c.days;i++){if(a[i])xp+=XP_PER_TASK}}}const logs=wd.logs||{};for(const dk of Object.keys(logs)){const l=logs[dk];if(l.mood!==undefined)xp+=3;if(l.energy!==undefined)xp+=2;if(l.note&&l.note.length>0)xp+=5}const o=getOverallScore(wd,data.categories);if(o.pct>=80)xp+=100;else if(o.pct>=50)xp+=50}for(const wk of Object.keys(data.challenges||{})){for(const ch of(data.challenges[wk]||[])){if(ch.completed)xp+=ch.xpReward}}return xp}
function calcStats(data){let s=0,i=0,g=0;for(const wid of Object.keys(data.weeks)){const wd=data.weeks[wid];for(const c of data.categories){const ct=wd.tasks[c.id]||{};let cnt=0;for(const t of c.tasks){const a=ct[t]||[];for(let d=0;d<c.days;d++){if(a[d])cnt++}}if(c.id==='fitness')s+=cnt;else if(c.id==='emotional')i+=cnt;else if(c.id==='financial')g+=cnt}}return{str:s,int:i,gold:g}}
function seededRandom(seed){let h=0;for(let i=0;i<seed.length;i++){h=((h<<5)-h)+seed.charCodeAt(i);h|=0}return()=>{h=(h*1103515245+12345)&0x7fffffff;return(h>>>16)/32767}}
function genChallenges(wid,cats){const r=seededRandom(wid);const ch=[];const tp=Math.floor(r()*40)+40;ch.push({id:`t_${wid}`,type:'target',title:'🎯 Weekly Target',description:`Score at least ${tp}% this week`,target:tp,xpReward:50,completed:false});const ci=Math.floor(r()*cats.length);const c=cats[ci];const sd=Math.floor(r()*3)+3;ch.push({id:`s_${wid}`,type:'streak',title:`${c.icon} ${sd}-Day Streak`,description:`Complete all ${c.name} tasks for ${sd} consecutive days`,target:sd,xpReward:40,completed:false,categoryId:c.id});const ri=Math.floor(r()*RANDOM_CHALLENGES.length);const rc=RANDOM_CHALLENGES[ri];ch.push({id:`r_${wid}`,type:'random',title:rc.title,description:rc.desc,target:rc.target,xpReward:30,completed:false,subType:rc.subType});return ch}
function getChProg(ch,wd,cats){if(ch.type==='target')return getOverallScore(wd,cats).pct;if(ch.type==='streak'){const c=cats.find(x=>x.id===ch.categoryId);if(!c)return 0;const ct=wd.tasks[c.id]||{};let mx=0,cur=0;for(let d=0;d<c.days;d++){const all=c.tasks.every(t=>(ct[t]||[])[d]);if(all){cur++;mx=Math.max(mx,cur)}else cur=0}return mx}if(ch.type==='random'){const logs=wd.logs||{};const v=Object.values(logs);switch(ch.subType){case'journal':return v.filter(l=>l.note&&l.note.length>0).length;case'savings':return v.filter(l=>(l.money||0)>0).length;case'mood':return v.filter(l=>l.mood!==undefined).length;case'energy':return v.filter(l=>l.energy!==undefined).length;case'perfectDay':{for(let d=0;d<7;d++){const all=cats.every(c=>{if(d>=c.days)return true;const ct=wd.tasks[c.id]||{};return c.tasks.every(t=>(ct[t]||[])[d])});if(all)return 1}return 0}default:return 0}}return 0}
function getDefault(){return{categories:DEFAULT_CATEGORIES.map(c=>({...c,tasks:[...c.tasks]})),weeks:{},player:{xp:0},challenges:{},goals:[],reminders:[]}}
function loadD(){try{const r=localStorage.getItem(SK);if(r){const d=JSON.parse(r);if(!d.categories||!d.weeks)return getDefault();if(!d.player)d.player={xp:calcXP(d)};if(!d.challenges)d.challenges={};if(!d.goals)d.goals=[];if(!d.reminders)d.reminders=[];return d}}catch(e){}return getDefault()}
function saveD(d){try{localStorage.setItem(SK,JSON.stringify(d))}catch(e){}}

const DC=createContext(null);
function DP({children}){
const[data,setData]=useState(getDefault);
const[selWeek,setSelWeek]=useState(getWeekId());
const[loaded,setLoaded]=useState(false);
const[lvlUp,setLvlUp]=useState(null);
const cw=getWeekId();
const isCW=selWeek===cw;

useEffect(()=>{const d=loadD();ensureWeek(d,cw);if(!d.challenges[cw])d.challenges[cw]=genChallenges(cw,d.categories);setData({...d});saveD(d);setLoaded(true)},[]);

const pXP=data.player?.xp||0;
const pLvl=Math.floor(pXP/XP_PER_LEVEL)+1;
const pRank=getRank(pLvl);
const xpInLvl=pXP%XP_PER_LEVEL;
const pStats=useMemo(()=>calcStats(data),[data]);

const addXP=useCallback((amt,prev)=>{const o=prev.player.xp;const n=Math.max(0,o+amt);const ol=Math.floor(o/XP_PER_LEVEL)+1;const nl=Math.floor(n/XP_PER_LEVEL)+1;if(nl>ol)setLvlUp({show:true,level:nl,rank:getRank(nl)});return{...prev,player:{xp:n}}},[]);

const toggleTask=useCallback((catId,task,dayIdx)=>{setData(prev=>{let nx={...prev,weeks:{...prev.weeks},player:{...prev.player},challenges:{...prev.challenges}};ensureWeek(nx,selWeek);const wd={...nx.weeks[selWeek]};if(!wd.tasks[catId])wd.tasks[catId]={};if(!wd.tasks[catId][task]){const c=nx.categories.find(x=>x.id===catId);wd.tasks[catId][task]=new Array(c?.days||7).fill(false)}wd.tasks[catId]={...wd.tasks[catId]};wd.tasks[catId][task]=[...wd.tasks[catId][task]];const was=wd.tasks[catId][task][dayIdx];wd.tasks[catId][task][dayIdx]=!was;wd.tasks={...wd.tasks};nx.weeks[selWeek]=wd;nx=addXP(was?-XP_PER_TASK:XP_PER_TASK,nx);if(nx.challenges[selWeek]){const chs=nx.challenges[selWeek].map(ch=>{if(ch.completed)return ch;const p=getChProg(ch,wd,nx.categories);if(p>=ch.target){nx=addXP(ch.xpReward,nx);return{...ch,completed:true}}return ch});nx.challenges={...nx.challenges,[selWeek]:chs}}saveD(nx);return nx})},[selWeek,addXP]);

const setMeta=useCallback((k,v)=>{setData(prev=>{const nx={...prev,weeks:{...prev.weeks}};ensureWeek(nx,selWeek);nx.weeks[selWeek]={...nx.weeks[selWeek],meta:{...nx.weeks[selWeek].meta,[k]:v}};saveD(nx);return nx})},[selWeek]);

const setLog=useCallback((di,k,v)=>{setData(prev=>{let nx={...prev,weeks:{...prev.weeks},player:{...prev.player},challenges:{...prev.challenges}};ensureWeek(nx,selWeek);const logs={...nx.weeks[selWeek].logs};const ol=logs[di]||{};const isNew=ol[k]===undefined;logs[di]={...ol,[k]:v};nx.weeks[selWeek]={...nx.weeks[selWeek],logs};if(isNew&&(k==='mood'||k==='energy'||k==='note')){nx=addXP(k==='note'?5:k==='mood'?3:2,nx)}if(nx.challenges[selWeek]){const wd=nx.weeks[selWeek];const chs=nx.challenges[selWeek].map(ch=>{if(ch.completed)return ch;const p=getChProg(ch,wd,nx.categories);if(p>=ch.target){nx=addXP(ch.xpReward,nx);return{...ch,completed:true}}return ch});nx.challenges={...nx.challenges,[selWeek]:chs}}saveD(nx);return nx})},[selWeek,addXP]);

const resetWeek=useCallback(()=>{setData(prev=>{const nx={...prev,weeks:{...prev.weeks}};delete nx.weeks[selWeek];ensureWeek(nx,selWeek);saveD(nx);return nx})},[selWeek]);
const deleteWeek=useCallback((wid)=>{setData(prev=>{const nx={...prev,weeks:{...prev.weeks},challenges:{...prev.challenges}};delete nx.weeks[wid];delete nx.challenges[wid];nx.player={xp:calcXP(nx)};saveD(nx);return nx})},[]);
const updateCats=useCallback((cats)=>{setData(prev=>{const nx={...prev,categories:cats};saveD(nx);return nx})},[]);

const wCh=useMemo(()=>{if(!data.challenges[selWeek]){data.challenges[selWeek]=genChallenges(selWeek,data.categories);saveD(data)}const wd=data.weeks[selWeek];if(!wd)return(data.challenges[selWeek]||[]).map(ch=>({...ch,progress:0}));return(data.challenges[selWeek]||[]).map(ch=>({...ch,progress:getChProg(ch,wd,data.categories)}))},[data,selWeek]);

const addGoal=useCallback((cat,title,td)=>{setData(prev=>{const g={id:`g_${Date.now()}`,category:cat,title,progress:0,targetDate:td,createdAt:new Date().toISOString(),archived:false};const nx={...prev,goals:[...prev.goals,g]};saveD(nx);return nx})},[]);
const updGoalProg=useCallback((id,delta)=>{setData(prev=>{const goals=prev.goals.map(g=>{if(g.id!==id)return g;const np=Math.max(0,Math.min(100,g.progress+delta));return{...g,progress:np,completedAt:np>=100&&g.progress<100?new Date().toISOString():g.completedAt}});const nx={...prev,goals};saveD(nx);return nx})},[]);
const updGoal=useCallback((id,title,td)=>{setData(prev=>{const goals=prev.goals.map(g=>g.id===id?{...g,title,targetDate:td}:g);const nx={...prev,goals};saveD(nx);return nx})},[]);
const archGoal=useCallback((id)=>{setData(prev=>{const goals=prev.goals.map(g=>g.id===id?{...g,archived:true}:g);const nx={...prev,goals};saveD(nx);return nx})},[]);
const delGoal=useCallback((id)=>{setData(prev=>{const goals=prev.goals.filter(g=>g.id!==id);const nx={...prev,goals};saveD(nx);return nx})},[]);
const dismissLvl=useCallback(()=>setLvlUp(null),[]);

return React.createElement(DC.Provider,{value:{data,currentWeek:cw,selectedWeek:selWeek,setSelectedWeek:setSelWeek,toggleTask,setMeta,setLog,resetWeek,updateCategories:updateCats,isCurrentWeek:isCW,loaded,deleteWeek,playerXP:pXP,playerLevel:pLvl,playerRank:pRank,xpInLevel:xpInLvl,playerStats:pStats,levelUpInfo:lvlUp,dismissLevelUp:dismissLvl,weekChallenges:wCh,addGoal,updateGoalProgress:updGoalProg,updateGoal:updGoal,archiveGoal:archGoal,deleteGoal:delGoal}},children)}
function useD(){const c=useContext(DC);if(!c)throw new Error('wrap');return c}

function PBar({pct,color,height=7}){return(<div style={{height,backgroundColor:'rgba(255,255,255,0.06)',borderRadius:height,overflow:'hidden',width:'100%'}}><div style={{height,borderRadius:height,backgroundColor:color,width:`${pct}%`,transition:'width 0.4s ease'}}/></div>)}

function CirProg({size,sw,progress,color=C.accent}){const r=(size-sw)/2;const circ=2*Math.PI*r;const off=circ-(Math.min(progress,100)/100)*circ;return(<div style={{width:size,height:size,position:'relative',display:'flex',alignItems:'center',justifyContent:'center'}}><svg width={size} height={size} style={{transform:'rotate(-90deg)',position:'absolute'}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={sw}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw} strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round" style={{transition:'stroke-dashoffset 0.5s ease'}}/></svg><span style={{fontSize:size*0.22,fontWeight:800,color:C.text,zIndex:1}}>{progress}%</span></div>)}

function scoreLabel(p){if(p>=75)return'🔥 Crushing it!';if(p>=50)return'✨ Good';if(p>=25)return'💫 Push';return'🎯 Start'}

const sty={sc:{padding:'0 16px'},ld:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:C.accent,fontSize:16},cd:{backgroundColor:C.card,borderRadius:16,padding:16,border:`1px solid ${C.border}`},ib:{backgroundColor:C.inputBg,borderRadius:8,border:`1px solid ${C.border}`,color:C.text,fontSize:14,padding:12,width:'100%',boxSizing:'border-box',outline:'none',fontFamily:'inherit'},fl:{fontSize:12,color:C.sub,marginBottom:6,marginTop:10,textTransform:'uppercase',letterSpacing:0.5},ab:{flex:1,padding:'12px 0',borderRadius:10,backgroundColor:C.card,border:`1px solid ${C.border}`,fontSize:13,fontWeight:600,cursor:'pointer',textAlign:'center'},nb:{flex:1,padding:'10px 0',borderRadius:10,backgroundColor:C.card,border:`1px solid ${C.border}`,color:C.sub,fontSize:12,fontWeight:600,cursor:'pointer',textAlign:'center'},ib2:{background:'none',border:'none',fontSize:18,cursor:'pointer',padding:4},mo:{position:'fixed',top:0,left:0,right:0,bottom:0,backgroundColor:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,padding:20},mc:{backgroundColor:C.card,borderRadius:16,padding:20,border:`1px solid ${C.border}`,width:'100%',maxWidth:400}};

// ===== TRACKER TAB =====
function TrackerTab(){
const{data,selectedWeek:sw,currentWeek:cw,isCurrentWeek:isCW,toggleTask,setMeta,resetWeek,loaded,weekChallenges:wCh,playerLevel:pLvl,playerRank:pRank}=useD();
const wd=useMemo(()=>{const d={...data};ensureWeek(d,sw);return d.weeks[sw]},[data,sw]);
const ov=useMemo(()=>getOverallScore(wd,data.categories),[wd,data.categories]);
const cs=useMemo(()=>data.categories.map(cat=>({...getCategoryScore(wd,cat),cat})),[wd,data.categories]);
const streak=useMemo(()=>{let c=0,w=cw;while(data.weeks[w]){const s=getOverallScore(data.weeks[w],data.categories);if(s.pct>=50)c++;else break;w=getAdjacentWeek(w,-1)}return c},[data,cw]);
const ti=getTodayIndex();
const handleExport=()=>{const l=[`📊 WEEKLY PROGRESS REPORT`,getWeekRange(sw),'',`Overall: ${ov.done}/${ov.total} (${ov.pct}%)`,''];for(const c of cs){l.push(`${c.cat.icon} ${c.cat.name}: ${c.done}/${c.total} (${c.pct}%)`);for(const t of c.cat.tasks){const a=wd.tasks[c.cat.id]?.[t]||[];l.push(`  ${a.filter(Boolean).length>0?'✅':'⬜'} ${t}: ${a.filter(Boolean).length}/${c.cat.days}`)}l.push('')}navigator.clipboard?.writeText(l.join('\n')).then(()=>alert('Copied!')).catch(()=>alert(l.join('\n')))};
if(!loaded)return <div style={sty.ld}>Loading...</div>;
return(<div style={sty.sc}>
<div style={{paddingTop:12,paddingBottom:8}}><h1 style={{fontSize:22,fontWeight:700,color:C.text,margin:0}}>All-in-1 Progress Tracker</h1><p style={{fontSize:13,color:C.sub,margin:'4px 0 0'}}>📍 {isCW?'Current Week':sw} • {getWeekRange(sw)}</p></div>
<div style={{...sty.cd,display:'flex',alignItems:'center',gap:16,marginTop:12}}><div style={{flex:1}}><p style={{fontSize:12,color:C.sub,textTransform:'uppercase',letterSpacing:1,margin:0}}>Weekly Score</p><p style={{fontSize:36,fontWeight:800,color:C.text,margin:'4px 0'}}>{ov.done}<span style={{fontSize:20,fontWeight:400,color:C.sub}}>/{ov.total}</span></p>{streak>0&&<p style={{fontSize:12,color:C.accent,margin:0}}>🔥 {streak} week streak!</p>}<div style={{display:'flex',gap:12,marginTop:8}}>{cs.map(c=><div key={c.cat.id} style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:8,height:8,borderRadius:4,backgroundColor:c.cat.color}}/><span style={{fontSize:11,color:C.sub}}>{c.pct}%</span></div>)}</div></div><CirProg size={80} sw={6} progress={ov.pct}/></div>
{ov.pct>=80&&isCW&&<div style={{backgroundColor:'#64ffda18',borderRadius:12,padding:12,marginTop:12,textAlign:'center',border:`1px solid ${C.accent}`}}><span style={{fontSize:14,color:C.accent,fontWeight:600}}>🎉 Amazing week! You're crushing it! 🎉</span></div>}
<div style={{...sty.cd,marginTop:14,borderColor:'#3b82f640'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}><span style={{fontSize:16,fontWeight:600,color:C.text}}>⚔️ Weekly Challenges</span><span style={{backgroundColor:'#3b82f620',padding:'4px 10px',borderRadius:8,border:'1px solid #3b82f640',fontSize:11,fontWeight:700,color:'#3b82f6'}}>{pRank.icon} Lv.{pLvl}</span></div>{wCh.map(ch=>{const p=Math.min(100,Math.round((ch.progress/ch.target)*100));return(<div key={ch.id} style={{backgroundColor:ch.completed?'#64ffda10':C.inputBg,borderRadius:10,padding:10,marginBottom:6,border:ch.completed?'1px solid #64ffda30':'none'}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}><div style={{flex:1}}><p style={{fontSize:13,fontWeight:600,color:C.text,margin:0}}>{ch.title}</p><p style={{fontSize:11,color:C.sub,margin:'1px 0 0'}}>{ch.description}</p></div><span style={{fontSize:11,fontWeight:700,color:ch.completed?C.accent:'#3b82f6'}}>{ch.completed?'✅':`+${ch.xpReward} XP`}</span></div><PBar pct={p} color={ch.completed?C.accent:'#3b82f6'} height={5}/><p style={{fontSize:10,color:C.sub,margin:'3px 0 0'}}>{ch.progress}/{ch.target}{ch.completed?' — Complete!':''}</p></div>)})}</div>

const[ntI,setNtI]=useState({});
useEffect(()=>{setCats(data.categories.map(c=>({...c,tasks:[...c.tasks]})))},[data.categories]);
const uC=(i,k,v)=>{setCats(p=>{const n=[...p];n[i]={...n[i],[k]:v};return n})};
const rT=(ci,ti)=>{setCats(p=>{const n=[...p];n[ci]={...n[ci],tasks:n[ci].tasks.filter((_,i)=>i!==ti)};return n})};
const aT=(ci)=>{const tn=(ntI[ci]||'').trim();if(!tn)return;setCats(p=>{const n=[...p];n[ci]={...n[ci],tasks:[...n[ci].tasks,tn]};return n});setNtI(p=>({...p,[ci]:''}))};
const aC=()=>{const id=`c_${Date.now()}`;const used=cats.map(c=>c.color);const col=CATEGORY_COLORS.find(c=>!used.includes(c))||'#3b82f6';setCats(p=>[...p,{id,name:'New Category',icon:'📌',color:col,days:7,tasks:['New Task']}])};
const save=()=>{updC(cats);onClose()};
return(<div style={sty.sc}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingTop:12,marginBottom:16}}><h2 style={{fontSize:20,fontWeight:700,color:C.text,margin:0}}>⚙️ Settings</h2><button onClick={save} style={{backgroundColor:C.accent,color:C.bg,padding:'8px 16px',borderRadius:8,border:'none',fontSize:14,fontWeight:700,cursor:'pointer'}}>Save & Close</button></div>
<p style={{fontSize:14,fontWeight:600,color:C.accent,textTransform:'uppercase',letterSpacing:1,margin:'0 0 12px'}}>Categories</p>
{cats.map((cat,ci)=><div key={cat.id} style={{...sty.cd,marginBottom:14}}><div style={{display:'flex',gap:8,marginBottom:12}}><input style={{...sty.ib,width:48,textAlign:'center',fontSize:22,flex:'none'}} value={cat.icon} onChange={e=>uC(ci,'icon',e.target.value)} maxLength={2}/><input style={{...sty.ib,flex:1,fontSize:16}} value={cat.name} onChange={e=>uC(ci,'name',e.target.value)}/></div><p style={sty.fl}>Days per week</p><div style={{display:'flex',gap:8,marginBottom:12}}>{[5,6,7].map(d=><button key={d} onClick={()=>uC(ci,'days',d)} style={{padding:'8px 16px',borderRadius:8,backgroundColor:cat.days===d?C.accent:C.inputBg,border:`1px solid ${cat.days===d?C.accent:C.border}`,color:cat.days===d?C.bg:C.sub,fontSize:14,fontWeight:600,cursor:'pointer'}}>{d}</button>)}</div><p style={sty.fl}>Color</p><div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>{CATEGORY_COLORS.map(col=><button key={col} onClick={()=>uC(ci,'color',col)} style={{width:32,height:32,borderRadius:16,backgroundColor:col,border:`2px solid ${cat.color===col?'#fff':'transparent'}`,cursor:'pointer'}}/>)}</div><p style={sty.fl}>Tasks</p>{cat.tasks.map((t,ti)=><div key={ti} style={{display:'flex',alignItems:'center',justifyContent:'space-between',backgroundColor:C.inputBg,borderRadius:8,padding:'10px 12px',marginBottom:4}}><span style={{fontSize:14,color:C.text}}>{t}</span><button onClick={()=>rT(ci,ti)} style={{...sty.ib2,color:C.danger}}>✕</button></div>)}<div style={{display:'flex',gap:8,marginTop:8}}><input style={{...sty.ib,flex:1,height:40}} placeholder="New task..." value={ntI[ci]||''} onChange={e=>setNtI(p=>({...p,[ci]:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&aT(ci)}/><button onClick={()=>aT(ci)} style={{height:40,padding:'0 14px',borderRadius:8,backgroundColor:C.accent,border:'none',color:C.bg,fontSize:13,fontWeight:700,cursor:'pointer'}}>+ Add</button></div><button onClick={()=>{if(confirm(`Delete "${cat.name}"?`))setCats(p=>p.filter((_,i)=>i!==ci))}} style={{background:'none',border:'none',color:C.danger,fontSize:13,cursor:'pointer',marginTop:12,padding:8,width:'100%',textAlign:'center'}}>🗑 Delete Category</button></div>)}
<button onClick={aC} style={{...sty.cd,width:'100%',textAlign:'center',border:`1px dashed ${C.accent}`,cursor:'pointer',color:C.accent,fontSize:14,fontWeight:600}}>+ Add New Category</button>
<div style={{height:60}}/></div>)}

// ===== LEVEL UP OVERLAY =====
function LvlUpOvl(){const{levelUpInfo:li,dismissLevelUp:dl}=useD();if(!li?.show)return null;return(<div onClick={dl} style={sty.mo}><div style={{backgroundColor:'#0a1025',borderRadius:20,border:`2px solid ${li.rank.color}`,padding:40,textAlign:'center',boxShadow:`0 0 30px ${li.rank.color}80`}}><p style={{fontSize:48,margin:0}}>⚡</p><p style={{fontSize:28,fontWeight:900,letterSpacing:3,color:li.rank.color,margin:'8px 0 0'}}>LEVEL UP!</p><p style={{fontSize:44,fontWeight:900,color:C.text,margin:'4px 0'}}>Level {li.level}</p><p style={{fontSize:16,fontWeight:700,color:li.rank.color,margin:'8px 0'}}>{li.rank.icon} {li.rank.name}</p><p style={{fontSize:12,color:C.sub,marginTop:20,opacity:0.6}}>Tap to continue</p></div></div>)}

// ===== MAIN APP =====
const TABS=[{id:'tracker',label:'📊 Tracker'},{id:'dailylog',label:'📋 Log'},{id:'history',label:'📅 History'},{id:'hunter',label:'⚔️ Hunter'}];
function App(){
const[tab,setTab]=useState('tracker');
const[showS,setShowS]=useState(false);
return(<DP><div style={{minHeight:'100vh',backgroundColor:C.bg,color:C.text,maxWidth:480,margin:'0 auto',position:'relative',display:'flex',flexDirection:'column'}}><div style={{flex:1,overflow:'auto',paddingBottom:70}}>{showS?<SettingsPanel onClose={()=>setShowS(false)}/>:<>{tab==='tracker'&&<TrackerTab/>}{tab==='dailylog'&&<DailyLogTab/>}{tab==='history'&&<HistoryTab/>}{tab==='hunter'&&<HunterTab/>}</>}</div>
{!showS&&<button onClick={()=>setShowS(true)} style={{position:'fixed',bottom:76,right:'calc(50% - 220px)',width:44,height:44,borderRadius:22,backgroundColor:C.card,border:`1px solid ${C.border}`,color:C.sub,fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',zIndex:50,boxShadow:'0 2px 8px rgba(0,0,0,0.3)'}}>⚙️</button>}
<div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:480,display:'flex',backgroundColor:'#0d1220',borderTop:`1px solid ${C.border}`,paddingBottom:8,zIndex:100}}>{TABS.map(t=><button key={t.id} onClick={()=>{setTab(t.id);setShowS(false)}} style={{flex:1,padding:'10px 0',background:'none',border:'none',color:tab===t.id&&!showS?C.accent:C.sub,fontSize:12,fontWeight:tab===t.id&&!showS?700:500,cursor:'pointer',transition:'color 0.2s'}}>{t.label}</button>)}</div>
<LvlUpOvl/></div></DP>)}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
