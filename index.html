const{useState,useEffect,useCallback,useMemo,createContext,useContext}=React;

// ===== COLORS & CONSTANTS =====
const C={bg:'#0a0e17',card:'#13182a',border:'#1e2640',inputBg:'#181f35',text:'#e2e8f0',sub:'#7c8aa0',accent:'#64ffda',danger:'#ff6b6b'};
const MOODS=['😊','😐','😔','😡','😴','🤩'];
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const JOURNAL_PROMPTS=['What went well today?','What did you learn?','What are you grateful for?','How can tomorrow be better?','One highlight from today...','What challenged you?','Something that made you smile...'];
const CATEGORY_COLORS=['#10b981','#8b5cf6','#f59e0b','#3b82f6','#ef4444','#ec4899','#06b6d4','#84cc16'];

const DEFAULT_CATEGORIES=[
{id:'fitness',name:'Fitness Tracker',icon:'💪',color:'#10b981',days:7,tasks:['Do Workout','Log Meal 1','Log Meal 2','Log Meal 3','Hit Calories Intake','Hit Protein Intake']},
{id:'emotional',name:'Emotional Growth',icon:'🧠',color:'#8b5cf6',days:7,tasks:['Write Growth Journal','Talk to Family / Friend','Play any Match']},
{id:'financial',name:'Financial Growth',icon:'💰',color:'#f59e0b',days:6,tasks:['Go to Work','Log Hours','Do Next Practical Step']}
];

const RANKS=[
{min:1,max:5,name:'E-Rank',title:'Beginner Hunter',color:'#6b7280',icon:'🗡️'},
{min:6,max:12,name:'D-Rank',title:'Apprentice Hunter',color:'#10b981',icon:'⚔️'},
{min:13,max:20,name:'C-Rank',title:'Skilled Hunter',color:'#3b82f6',icon:'🛡️'},
{min:21,max:30,name:'B-Rank',title:'Elite Hunter',color:'#8b5cf6',icon:'🏹'},
{min:31,max:42,name:'A-Rank',title:'Master Hunter',color:'#f59e0b',icon:'👑'},
{min:43,max:999,name:'S-Rank',title:'Shadow Monarch',color:'#ef4444',icon:'🔥'}
];

const getRank=(level)=>RANKS.find(r=>level>=r.min&&level<=r.max)||RANKS[0];
const XP_PER_TASK=10,XP_PER_LEVEL=100;

const RANDOM_CHALLENGES=[
{title:'📝 Journal Master',desc:'Write in your journal 5 days',target:5,subType:'journal'},
{title:'💰 Savings Sprint',desc:'Save money 4 days this week',target:4,subType:'savings'},
{title:'😊 Mood Logger',desc:'Log mood every day this week',target:7,subType:'mood'},
{title:'💪 Perfect Day',desc:'Complete ALL tasks in one day',target:1,subType:'perfectDay'},
{title:'⚡ Energy Tracker',desc:'Log energy level 5 days',target:5,subType:'energy'}
];

const GOAL_CATEGORIES=[
{id:'health',name:'Health',icon:'🏋️',color:'#10b981'},
{id:'wealth',name:'Wealth',icon:'💎',color:'#f59e0b'},
{id:'happiness',name:'Happiness',icon:'😊',color:'#8b5cf6'}
];

const SK='pt_pwa_v1';

// ===== STYLES OBJECT =====
const sty={
sc:{padding:'14px 12px',paddingBottom:20},
ld:{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'60vh',color:C.sub,fontSize:16},
cd:{backgroundColor:C.card,borderRadius:12,border:`1px solid ${C.border}`,padding:14},
ib:{width:'100%',padding:12,backgroundColor:C.inputBg,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontSize:14,marginBottom:8,outline:'none'},
ib2:{width:44,height:44,borderRadius:8,backgroundColor:C.inputBg,border:`1px solid ${C.border}`,color:C.sub,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16},
fl:{fontSize:12,color:C.sub,textTransform:'uppercase',letterSpacing:0.5,fontWeight:600,margin:'8px 0 6px'},
nb:{padding:'10px 14px',borderRadius:8,backgroundColor:'transparent',border:`1px solid ${C.border}`,color:C.text,fontSize:14,fontWeight:600,cursor:'pointer'},
mo:{position:'fixed',top:0,left:0,right:0,bottom:0,backgroundColor:'rgba(0,0,0,0.7)',display:'flex',alignItems:'flex-end',zIndex:1000,overscrollBehavior:'contain'},
mc:{width:'100%',maxWidth:480,backgroundColor:C.card,borderRadius:'16px 16px 0 0',padding:20,maxHeight:'90vh',overflow:'auto',borderTop:`1px solid ${C.border}`}
};

// ===== PROGRESS BAR COMPONENT =====
function PBar({pct,color,height=8}){
return<div style={{width:'100%',height,backgroundColor:C.inputBg,borderRadius:height/2,overflow:'hidden'}}>
<div style={{width:`${pct}%`,height:'100%',backgroundColor:color,transition:'width 0.3s ease'}}/>
</div>
}

// ===== UTILITY FUNCTIONS =====
function getWeekId(date){
const d=date||new Date();
const target=new Date(d.valueOf());
const dayNr=(d.getDay()+6)%7;
target.setDate(target.getDate()-dayNr+3);
const jan4=new Date(target.getFullYear(),0,4);
const dayDiff=(target.getTime()-jan4.getTime())/86400000;
const weekNr=1+Math.round((dayDiff-3+((jan4.getDay()+6)%7))/7);
return`${target.getFullYear()}-W${String(weekNr).padStart(2,'0')}`
}

function getWeekStart(weekId){
const p=weekId.split('-W');
const y=parseInt(p[0]);
const w=parseInt(p[1]);
const j=new Date(y,0,4);
const jd=(j.getDay()+6)%7;
const ws=new Date(j);
ws.setDate(j.getDate()-jd+(w-1)*7);
return ws
}

function getWeekRange(weekId){
const s=getWeekStart(weekId);
const e=new Date(s);
e.setDate(s.getDate()+6);
const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
return`${s.getDate()} ${m[s.getMonth()]} — ${e.getDate()} ${m[e.getMonth()]}`
}

function getTodayIndex(){
const d=new Date().getDay();
return d===0?6:d-1
}

function getAdjacentWeek(weekId,dir){
const s=getWeekStart(weekId);
s.setDate(s.getDate()+dir*7);
return getWeekId(s)
}

function initWeekData(cats){
const t={};
for(const c of cats){
t[c.id]={};
for(const task of c.tasks)t[c.id][task]=new Array(c.days).fill(false)
}
return{tasks:t,logs:{},meta:{stars:0,reflection:'',focus:''}}
}

function ensureWeek(data,wid){
if(!data.weeks[wid])data.weeks[wid]=initWeekData(data.categories);
for(const c of data.categories){
if(!data.weeks[wid].tasks[c.id])data.weeks[wid].tasks[c.id]={};
for(const t of c.tasks){
if(!data.weeks[wid].tasks[c.id][t])data.weeks[wid].tasks[c.id][t]=new Array(c.days).fill(false)
}
}
if(!data.weeks[wid].meta)data.weeks[wid].meta={stars:0,reflection:'',focus:''};
if(!data.weeks[wid].logs)data.weeks[wid].logs={};
return data
}

function getCategoryScore(wd,cat){
const ct=wd.tasks[cat.id]||{};
let d=0,total=0;
for(const t of cat.tasks){
const a=ct[t]||[];
for(let i=0;i<cat.days;i++){
total++;
if(a[i])d++
}
}
return{done:d,total,pct:total>0?Math.round((d/total)*100):0}
}

function getOverallScore(wd,cats){
let d=0,t=0;
for(const c of cats){
const s=getCategoryScore(wd,c);
d+=s.done;
t+=s.total
}
return{done:d,total:t,pct:t>0?Math.round((d/t)*100):0}
}

function calcXP(data){
let xp=0;
for(const wid of Object.keys(data.weeks)){
const wd=data.weeks[wid];
for(const c of data.categories){
const ct=wd.tasks[c.id]||{};
for(const t of c.tasks){
const a=ct[t]||[];
for(let i=0;i<c.days;i++){
if(a[i])xp+=XP_PER_TASK
}
}
}
const logs=wd.logs||{};
for(const dk of Object.keys(logs)){
const l=logs[dk];
if(l.mood!==undefined)xp+=3;
if(l.energy!==undefined)xp+=2;
if(l.note&&l.note.length>0)xp+=5
}
const o=getOverallScore(wd,data.categories);
if(o.pct>=80)xp+=100;
else if(o.pct>=50)xp+=50
}
for(const wk of Object.keys(data.challenges||{})){
for(const ch of(data.challenges[wk]||[])){
if(ch.completed)xp+=ch.xpReward
}
}
return xp
}

function calcStats(data){
let s=0,i=0,g=0;
for(const wid of Object.keys(data.weeks)){
const wd=data.weeks[wid];
for(const c of data.categories){
const ct=wd.tasks[c.id]||{};
let cnt=0;
for(const t of c.tasks){
const a=ct[t]||[];
for(let d=0;d<c.days;d++){
if(a[d])cnt++
}
}
if(c.id==='fitness')s+=cnt;
else if(c.id==='emotional')i+=cnt;
else if(c.id==='financial')g+=cnt
}
}
return{str:s,int:i,gold:g}
}

function seededRandom(seed){
let h=0;
for(let i=0;i<seed.length;i++){
h=((h<<5)-h)+seed.charCodeAt(i);
h|=0
}
return()=>{
h=(h*1103515245+12345)&0x7fffffff;
return(h>>>16)/32767
}
}

function genChallenges(wid,cats){
const r=seededRandom(wid);
const ch=[];
const tp=Math.floor(r()*40)+40;
ch.push({id:`t_${wid}`,type:'target',title:'🎯 Weekly Target',description:`Score at least ${tp}% this week`,target:tp,xpReward:50,completed:false});
const ci=Math.floor(r()*cats.length);
const c=cats[ci];
const sd=Math.floor(r()*3)+3;
ch.push({id:`s_${wid}`,type:'streak',title:`${c.icon} ${sd}-Day Streak`,description:`Complete all ${c.name} tasks for ${sd} consecutive days`,target:sd,xpReward:40,completed:false,categoryId:c.id});
const ri=Math.floor(r()*RANDOM_CHALLENGES.length);
const rc=RANDOM_CHALLENGES[ri];
ch.push({id:`r_${wid}`,type:'random',title:rc.title,description:rc.desc,target:rc.target,xpReward:30,completed:false,subType:rc.subType});
return ch
}

function getChProg(ch,wd,cats){
if(ch.type==='target')return getOverallScore(wd,cats).pct;
if(ch.type==='streak'){
const c=cats.find(x=>x.id===ch.categoryId);
if(!c)return 0;
const ct=wd.tasks[c.id]||{};
let mx=0,cur=0;
for(let d=0;d<c.days;d++){
const all=c.tasks.every(t=>(ct[t]||[])[d]);
if(all){cur++;mx=Math.max(mx,cur)}else cur=0
}
return mx
}
if(ch.type==='random'){
const logs=wd.logs||{};
const v=Object.values(logs);
switch(ch.subType){
case'journal':return v.filter(l=>l.note&&l.note.length>0).length;
case'savings':return v.filter(l=>(l.money||0)>0).length;
case'mood':return v.filter(l=>l.mood!==undefined).length;
case'energy':return v.filter(l=>l.energy!==undefined).length;
case'perfectDay':{
for(let d=0;d<7;d++){
const all=cats.every(c=>{
if(d>=c.days)return true;
const ct=wd.tasks[c.id]||{};
return c.tasks.every(t=>(ct[t]||[])[d])
});
if(all)return 1
}
return 0
}
default:return 0
}
}
return 0
}

function getDefault(){
return{categories:DEFAULT_CATEGORIES.map(c=>({...c,tasks:[...c.tasks]})),weeks:{},player:{xp:0},challenges:{},goals:[],reminders:[]}
}

function loadD(){
try{
const r=localStorage.getItem(SK);
if(r){
const d=JSON.parse(r);
if(!d.categories||!d.weeks)return getDefault();
if(!d.player)d.player={xp:calcXP(d)};
if(!d.challenges)d.challenges={};
if(!d.goals)d.goals=[];
if(!d.reminders)d.reminders=[];
return d
}
}catch(e){}
return getDefault()
}

function saveD(d){
try{localStorage.setItem(SK,JSON.stringify(d))}catch(e){}
}

// ===== CSV EXPORT FUNCTION =====
function exportToCSV(data){
let csv='Week,Category,Task,Monday,Tuesday,Wednesday,Thursday,Friday,Saturday,Sunday\n';
for(const wid of Object.keys(data.weeks)){
const wd=data.weeks[wid];
for(const c of data.categories){
const ct=wd.tasks[c.id]||{};
for(const t of c.tasks){
const row=[wid,c.name,t];
const tasks=ct[t]||[];
for(let i=0;i<c.days;i++){
row.push(tasks[i]?'✓':'✗')
}
csv+=row.join(',')+'\n'
}
}
}
const blob=new Blob([csv],{type:'text/csv'});
const url=window.URL.createObjectURL(blob);
const a=document.createElement('a');
a.href=url;
a.download=`tracker_export_${new Date().toISOString().split('T')[0]}.csv`;
a.click();
window.URL.revokeObjectURL(url);
}

// ===== DATA CONTEXT =====
const DC=createContext(null);
function DP({children}){
const[data,setData]=useState(getDefault);
const[selWeek,setSelWeek]=useState(getWeekId());
const[loaded,setLoaded]=useState(false);
const[lvlUp,setLvlUp]=useState(null);
const cw=getWeekId();
const isCW=selWeek===cw;

useEffect(()=>{
const d=loadD();
ensureWeek(d,cw);
if(!d.challenges[cw])d.challenges[cw]=genChallenges(cw,d.categories);
setData({...d});
saveD(d);
setLoaded(true)
},[]);

const pXP=data.player?.xp||0;
const pLvl=Math.floor(pXP/XP_PER_LEVEL)+1;
const pRank=getRank(pLvl);
const xpInLvl=pXP%XP_PER_LEVEL;
const pStats=useMemo(()=>calcStats(data),[data]);

const addXP=useCallback((amt,prev)=>{
const o=prev.player.xp;
const n=Math.max(0,o+amt);
const ol=Math.floor(o/XP_PER_LEVEL)+1;
const nl=Math.floor(n/XP_PER_LEVEL)+1;
if(nl>ol)setLvlUp({show:true,level:nl,rank:getRank(nl)});
return{...prev,player:{xp:n}}
},[]);

const toggleTask=useCallback((taskName,dayIdx)=>{
if(!isCW)return;
setData(p=>{
const n={...p};
const wd=n.weeks[cw];
const catId=Object.keys(wd.tasks).find(cid=>wd.tasks[cid][taskName]!==undefined);
if(!catId)return p;
wd.tasks[catId][taskName][dayIdx]=!wd.tasks[catId][taskName][dayIdx];
const wasXP=wd.tasks[catId][taskName][dayIdx]?XP_PER_TASK:0;
const nd=addXP(wasXP,n);
saveD(nd);
return nd
})
},[cw,isCW,addXP]);

const setLog=useCallback((dayIdx,key,value)=>{
setData(p=>{
const n={...p};
const wd=n.weeks[cw];
wd.logs[dayIdx]={...(wd.logs[dayIdx]||{}),​[key]:value};
const nd=addXP(0,n);
saveD(nd);
return nd
})
},[cw,addXP]);

const updateCategories=useCallback((newCats)=>{
setData(p=>{
const n={...p};
n.categories=newCats;
for(const wid of Object.keys(n.weeks)){
const wd=n.weeks[wid];
for(const c of newCats){
if(!wd.tasks[c.id])wd.tasks[c.id]={};
for(const t of c.tasks){
if(!wd.tasks[c.id][t])wd.tasks[c.id][t]=new Array(c.days).fill(false)
}
}
}
saveD(n);
return n
})
},[]);

const addGoal=useCallback((cat,title,date)=>{
setData(p=>{
const n={...p};
const id=`g_${Date.now()}`;
n.goals=[...n.goals,{id,category:cat,title,targetDate:date,progress:0,archived:false}];
saveD(n);
return n
})
},[]);

const updateGoal=useCallback((id,title,date)=>{
setData(p=>{
const n={...p};
const g=n.goals.find(x=>x.id===id);
if(g){g.title=title;g.targetDate=date}
saveD(n);
return n
})
},[]);

const updateGoalProgress=useCallback((id,amt)=>{
setData(p=>{
const n={...p};
const g=n.goals.find(x=>x.id===id);
if(g)g.progress=Math.max(0,Math.min(100,g.progress+amt));
saveD(n);
return n
})
},[]);

const archiveGoal=useCallback((id)=>{
setData(p=>{
const n={...p};
const g=n.goals.find(x=>x.id===id);
if(g)g.archived=true;
saveD(n);
return n
})
},[]);

const deleteGoal=useCallback((id)=>{
setData(p=>{
const n={...p};
n.goals=n.goals.filter(g=>g.id!==id);
saveD(n);
return n
})
},[]);

const deleteWeek=useCallback((wid)=>{
setData(p=>{
const n={...p};
delete n.weeks[wid];
saveD(n);
return n
})
},[]);

const dismissLevelUp=useCallback(()=>{setLvlUp(null)},[]);

return<DC.Provider value={{data,selectedWeek:selWeek,setSelectedWeek:setSelWeek,isCurrentWeek:isCW,currentWeek:cw,playerXP:pXP,playerLevel:pLvl,playerRank:pRank,xpInLevel:xpInLvl,playerStats:pStats,toggleTask,setLog,updateCategories,loaded,addGoal,updateGoal,updateGoalProgress,archiveGoal,deleteGoal,deleteWeek,levelUpInfo:lvlUp,dismissLevelUp,exportToCSV}}>{children}</DC.Provider>
}

function useD(){return useContext(DC)}

// ===== TRACKER TAB =====
function TrackerTab(){
const{data,selectedWeek:sw,isCurrentWeek:isCW,currentWeek:cw,toggleTask,loaded}=useD();
const wd=useMemo(()=>{const d={...data};ensureWeek(d,sw);return d.weeks[sw]},[data,sw]);
const ti=getTodayIndex();

if(!loaded)return <div style={sty.ld}>Loading...</div>;
return(<div style={sty.sc}>
<h1 style={{fontSize:22,fontWeight:700,color:C.text,margin:0,paddingTop:12,marginBottom:6}}>📊 Tracker</h1>
<p style={{fontSize:13,color:C.sub,margin:'0 0 12px'}}>Daily task completion</p>
{data.categories.map(cat=>{
const s=getCategoryScore(wd,cat);
return(<div key={cat.id} style={{...sty.cd,marginBottom:12}}>
<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
<div><p style={{fontSize:12,color:C.sub,margin:0}}>{cat.icon} {cat.name}</p><p style={{fontSize:14,fontWeight:600,color:cat.color,margin:'2px 0 0'}}>{s.pct}%</p></div>
<div style={{width:50}}><PBar pct={s.pct} color={cat.color} height={8}/></div>
</div>
<div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:6}}>
{DAYS.map((day,idx)=>{
const isT=idx===ti&&isCW;
const done=((wd.tasks[cat.id]||{})[cat.tasks[0]]||[])[idx];
return(<div key={idx} style={{textAlign:'center'}}>
<p style={{fontSize:10,color:C.sub,margin:0,marginBottom:4}}>{day}</p>
<button onClick={()=>isCW&&cat.tasks.forEach(t=>toggleTask(t,idx))} disabled={!isCW} style={{width:'100%',aspectRatio:'1',borderRadius:8,backgroundColor:done?cat.color+'20':C.inputBg,border:`1px solid ${done?cat.color:C.border}`,color:done?cat.color:C.sub,fontSize:12,fontWeight:700,cursor:isCW?'pointer':'default',transition:'all 0.2s'}}>{done?'✓':idx+1}</button>
{isT&&<p style={{fontSize:9,color:C.accent,margin:'2px 0 0',fontWeight:600}}>NOW</p>}
</div>)
})}
</div>
</div>)
})}
<div style={{height:40}}/>
</div>)
}

// ===== DAILY LOG TAB =====
function DailyLogTab(){
const{data,selectedWeek:sw,isCurrentWeek:isCW,setLog,loaded}=useD();
const[openDays,setOpenDays]=useState({[getTodayIndex()]:true});
const ti=getTodayIndex();
const wd=useMemo(()=>{const d={...data};ensureWeek(d,sw);return d.weeks[sw]},[data,sw]);
if(!loaded)return <div style={sty.ld}>Loading...</div>;
return(<div style={sty.sc}>
<h1 style={{fontSize:22,fontWeight:700,color:C.text,margin:0,paddingTop:12}}>📋 Daily Log</h1>
<p style={{fontSize:13,color:C.sub,margin:'0 0 12px'}}>Track mood, energy & notes</p>
{DAYS.map((dn,idx)=>{
const isO=openDays[idx];
const isT=idx===ti&&isCW;
const log=wd.logs[idx]||{};
return(<div key={idx} style={{...sty.cd,marginBottom:10,padding:0,overflow:'hidden'}}>
<button onClick={()=>setOpenDays(p=>({...p,[idx]:!p[idx]}))} style={{display:'flex',alignItems:'center',justifyContent:'space-between',width:'100%',padding:14,background:'none',border:'none',cursor:'pointer'}}>
<div style={{display:'flex',alignItems:'center',gap:8}}>
<span style={{fontSize:16,fontWeight:600,color:C.text}}>{dn}</span>
{isT&&<span style={{backgroundColor:C.accent,color:C.bg,padding:'2px 8px',borderRadius:6,fontSize:10,fontWeight:700}}>TODAY</span>}
</div>
<div style={{display:'flex',alignItems:'center',gap:8}}>
{log.mood!==undefined&&<span style={{fontSize:18}}>{MOODS[log.mood]}</span>}
{log.energy!==undefined&&<span style={{fontSize:11,color:C.sub}}>⚡{log.energy+1}</span>}
<span style={{fontSize:10,color:C.sub}}>{isO?'▲':'▼'}</span>
</div>
</button>
{isO&&<div style={{padding:'12px 14px 16px',borderTop:`1px solid ${C.border}`}}>
<p style={sty.fl}>How are you feeling?</p>
<div style={{display:'flex',gap:8}}>
{MOODS.map((em,mi)=><button key={mi} onClick={()=>isCW&&setLog(idx,'mood',mi)} disabled={!isCW} style={{width:44,height:44,borderRadius:12,fontSize:22,backgroundColor:log.mood===mi?'#64ffda18':C.inputBg,border:`1px solid ${log.mood===mi?C.accent:C.border}`,cursor:isCW?'pointer':'default'}}>{em}</button>)}
</div>

<div style={{height:60}}/>

{tab==='history'&&<HistoryTab/>}
{tab==='hunter'&&<HunterTab/>}
</>}
</div>
{!showS&&<button onClick={()=>setShowS(true)} style={{position:'fixed',bottom:76,right:'calc(50% - 220px)',width:44,height:44,borderRadius:22,backgroundColor:C.card,border:`1px solid ${C.border}`,color:C.sub,fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',zIndex:50,boxShadow:'0 2px 8px rgba(0,0,0,0.3)'}}>⚙️</button>}
<div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:480,display:'flex',backgroundColor:'#0d1220',borderTop:`1px solid ${C.border}`,paddingBottom:8,zIndex:100}}>
{TABS.map(t=><button key={t.id} onClick={()=>{setTab(t.id);setShowS(false)}} style={{flex:1,padding:'12px 0',background:'none',border:'none',color:tab===t.id&&!showS?C.accent:C.sub,fontSize:19,fontWeight:tab===t.id&&!showS?700:500,cursor:'pointer',transition:'color 0.2s'}}>
{t.label}

}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
