<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>HUNTER PROGRESS SYSTEM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg1:#050510;--bg2:#0a0a1a;--bg3:#0f0f2a;
  --cyan:#00f5ff;--purple:#a855f7;--red:#ff1744;--gold:#ffd700;
  --green:#00e676;--orange:#ff9100;--blue:#2979ff;
  --text:#c8d6e5;--sub:#576574;--card:rgba(0,245,255,0.03);
  --border:rgba(0,245,255,0.08);--glow:0 0 20px rgba(0,245,255,0.15);
}
html{scroll-behavior:smooth}
body{
  font-family:'Rajdhani','Segoe UI',sans-serif;color:var(--text);
  background:var(--bg1);min-height:100vh;padding-bottom:100px;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 20% 50%,rgba(0,245,255,0.03) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 20%,rgba(168,85,247,0.03) 0%,transparent 50%),
             radial-gradient(ellipse at 50% 80%,rgba(255,23,68,0.02) 0%,transparent 50%);
  pointer-events:none;z-index:0;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes glitchFlicker{0%,100%{opacity:1}50%{opacity:0.8}75%{opacity:1}85%{opacity:0.6}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 5px rgba(0,245,255,0.2),0 0 10px rgba(0,245,255,0.1)}50%{box-shadow:0 0 15px rgba(0,245,255,0.4),0 0 30px rgba(0,245,255,0.2),0 0 45px rgba(0,245,255,0.1)}}
@keyframes todayPulse{0%,100%{box-shadow:inset 0 0 8px rgba(0,245,255,0.15),0 0 4px rgba(0,245,255,0.1)}50%{box-shadow:inset 0 0 16px rgba(0,245,255,0.3),0 0 12px rgba(0,245,255,0.25),0 0 24px rgba(0,245,255,0.1)}}
@keyframes rankDown{0%{transform:scale(1);opacity:1}25%{transform:scale(1.3);opacity:0.7;filter:hue-rotate(-30deg)}50%{transform:scale(0.8);opacity:0.5}75%{transform:scale(1.1);opacity:0.8}100%{transform:scale(1);opacity:1}}
@keyframes warningPulse{0%,100%{background:rgba(255,23,68,0.05);border-color:rgba(255,23,68,0.2)}50%{background:rgba(255,23,68,0.15);border-color:rgba(255,23,68,0.5)}}
@keyframes shakeX{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-4px)}20%,40%,60%,80%{transform:translateX(4px)}}
@keyframes scanline{0%{top:-100%}100%{top:200%}}
@keyframes borderGlow{0%,100%{border-color:rgba(0,245,255,0.15)}50%{border-color:rgba(0,245,255,0.5)}}
.fu{animation:fadeUp 0.4s ease forwards;opacity:0}
.container{max-width:540px;margin:0 auto;padding:0 16px;position:relative;z-index:1}

/* Fullscreen overlays */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;display:flex;
  flex-direction:column;align-items:center;justify-content:center;
  background:rgba(5,5,16,0.97);backdrop-filter:blur(10px)}
.overlay h1{font-family:'Orbitron';font-size:36px;font-weight:900;text-transform:uppercase;margin-bottom:8px;letter-spacing:3px}
.overlay p{font-size:16px;color:var(--sub);margin-bottom:30px;text-align:center;max-width:320px;line-height:1.6}
.overlay button{padding:14px 40px;border:2px solid var(--cyan);background:transparent;color:var(--cyan);
  font-family:'Orbitron';font-size:14px;font-weight:700;cursor:pointer;border-radius:4px;
  transition:all 0.3s;text-transform:uppercase;letter-spacing:2px}
.overlay button:hover{background:var(--cyan);color:var(--bg1)}

/* Rank Down overlay */
.rank-down-overlay h1{color:var(--red);animation:shakeX 0.6s ease;text-shadow:0 0 30px rgba(255,23,68,0.5)}
.rank-down-overlay .rank-arrow{font-size:80px;margin:20px 0;animation:rankDown 1s ease}

/* Warning Banner */
.warning-banner{
  margin:12px 0;padding:14px 18px;border:1px solid rgba(255,23,68,0.3);border-radius:8px;
  background:rgba(255,23,68,0.08);animation:warningPulse 2s ease infinite;
  display:flex;align-items:center;gap:12px;cursor:pointer;transition:all 0.3s;
}
.warning-banner:hover{background:rgba(255,23,68,0.15)}
.warning-banner .icon{font-size:24px;animation:shakeX 2s ease infinite}
.warning-banner .msg{font-family:'Orbitron';font-size:11px;font-weight:700;color:var(--red);
  text-transform:uppercase;letter-spacing:1.5px;line-height:1.4}

/* Hunter ID Card */
.hunter-card{
  margin:16px 0;padding:20px;border:1px solid rgba(0,245,255,0.12);border-radius:12px;
  background:linear-gradient(135deg,rgba(0,245,255,0.04),rgba(168,85,247,0.04));
  position:relative;overflow:hidden;
}
.hunter-card::before{
  content:'';position:absolute;top:-100%;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);
  animation:scanline 3s linear infinite;opacity:0.3;
}
.hunter-card .hc-top{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.hunter-card .avatar{width:56px;height:56px;border-radius:50%;border:2px solid var(--cyan);
  display:flex;align-items:center;justify-content:center;font-size:28px;
  background:rgba(0,245,255,0.06);box-shadow:0 0 15px rgba(0,245,255,0.15)}
.hunter-card .hc-info h2{font-family:'Orbitron';font-size:16px;font-weight:800;color:var(--cyan);
  letter-spacing:1px;text-transform:uppercase}
.hunter-card .hc-info .rank-badge{display:inline-block;padding:3px 10px;border-radius:4px;
  font-family:'Orbitron';font-size:10px;font-weight:700;letter-spacing:1px;margin-top:4px;
  text-transform:uppercase}
.hunter-card .hc-info .title-badge{display:block;font-size:11px;color:var(--gold);
  font-weight:600;margin-top:2px;font-style:italic}
.hunter-card .hc-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.hunter-card .hc-stat{text-align:center;padding:8px 4px;border-radius:6px;
  background:rgba(0,245,255,0.04);border:1px solid rgba(0,245,255,0.06)}
.hunter-card .hc-stat .val{font-family:'Orbitron';font-size:14px;font-weight:800;color:var(--cyan)}
.hunter-card .hc-stat .lbl{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}

/* XP Bar */
.xp-section{margin:12px 0}
.xp-bar-outer{height:10px;background:rgba(255,255,255,0.05);border-radius:5px;overflow:hidden;position:relative}
.xp-bar-inner{height:100%;border-radius:5px;transition:width 0.6s ease;position:relative}
.xp-bar-inner::after{content:'';position:absolute;top:0;right:0;bottom:0;width:20px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3));border-radius:0 5px 5px 0}
.xp-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.xp-info .xp-label{font-family:'Orbitron';font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:1px}
.xp-info .xp-val{font-family:'Share Tech Mono';font-size:13px;color:var(--cyan);font-weight:700}

/* Tabs */
.tabs{display:flex;gap:6px;padding:16px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 18px;border:1px solid var(--border);border-radius:8px;background:transparent;
  color:var(--sub);font-family:'Orbitron';font-size:10px;font-weight:700;cursor:pointer;
  white-space:nowrap;transition:all 0.3s;text-transform:uppercase;letter-spacing:1px;flex-shrink:0}
.tab.active{background:rgba(0,245,255,0.1);border-color:var(--cyan);color:var(--cyan);
  box-shadow:0 0 15px rgba(0,245,255,0.1)}

/* Category Cards */
.cat-card{margin-bottom:20px;border:1px solid var(--border);border-radius:12px;
  background:var(--card);overflow:hidden}
.cat-header{padding:16px;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--border)}
.cat-header .left{display:flex;align-items:center;gap:10px}
.cat-header .emoji{font-size:20px}
.cat-header .label{font-family:'Orbitron';font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.cat-header .pct{font-family:'Share Tech Mono';font-size:14px;font-weight:700}
.cat-progress{height:3px;background:rgba(255,255,255,0.05)}
.cat-progress-fill{height:100%;transition:width 0.5s ease}

/* Task Grid */
.task-grid{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
.task-grid table{width:100%;border-collapse:collapse;min-width:380px}
.task-grid th{padding:8px 6px;font-family:'Orbitron';font-size:8px;font-weight:600;
  color:var(--sub);text-transform:uppercase;letter-spacing:0.5px;text-align:center;
  border-bottom:1px solid var(--border)}
.task-grid th.today-col{color:var(--cyan);animation:todayPulse 2.5s ease infinite;border-radius:4px}
.task-grid td{padding:6px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.02)}
.task-grid td:first-child{text-align:left;padding-left:14px;font-size:12px;font-weight:600;
  color:var(--text);white-space:nowrap}
.task-grid td.today-col{animation:todayPulse 2.5s ease infinite;border-radius:2px}

/* Checkboxes */
.cbx{width:28px;height:28px;border-radius:6px;border:2px solid rgba(255,255,255,0.12);
  background:transparent;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
  transition:all 0.25s;font-size:14px}
.cbx:hover{border-color:var(--cyan);background:rgba(0,245,255,0.05)}
.cbx.checked{border-color:var(--green);background:rgba(0,230,118,0.15)}
.cbx.missed{border-color:var(--red);background:rgba(255,23,68,0.1)}

/* Score Card */
.score-card{margin:16px 0;padding:20px;border:1px solid var(--border);border-radius:12px;
  background:var(--card);display:flex;align-items:center;justify-content:space-between}
.score-card .left .label{font-family:'Orbitron';font-size:10px;color:var(--sub);
  text-transform:uppercase;letter-spacing:1px}
.score-card .left .big{font-family:'Orbitron';font-size:28px;font-weight:900;color:var(--cyan);margin-top:4px}
.score-card .left .big span{font-size:16px;color:var(--sub);font-weight:600}
.score-card .left .streak{font-size:12px;color:var(--gold);font-weight:700;margin-top:4px}

/* Circle SVG */
.circ-wrap{width:80px;height:80px;position:relative}
.circ-wrap .pct-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Orbitron';font-size:16px;font-weight:900;color:var(--cyan)}

/* Penalty Log */
.penalty-log{margin:12px 0;padding:14px;border:1px solid rgba(255,23,68,0.12);border-radius:10px;
  background:rgba(255,23,68,0.04)}
.penalty-log h3{font-family:'Orbitron';font-size:10px;color:var(--red);text-transform:uppercase;
  letter-spacing:1px;margin-bottom:10px}
.penalty-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;
  border-bottom:1px solid rgba(255,23,68,0.06);font-size:12px}
.penalty-item:last-child{border:none}
.penalty-item .amt{font-family:'Share Tech Mono';color:var(--red);font-weight:700}

/* Boss Fight */
.boss-section{margin:16px 0;padding:20px;border:2px solid rgba(168,85,247,0.2);border-radius:12px;
  background:linear-gradient(135deg,rgba(168,85,247,0.06),rgba(0,245,255,0.03));
  position:relative;overflow:hidden}
.boss-section::before{content:'WEEKLY BOSS';position:absolute;top:10px;right:14px;
  font-family:'Orbitron';font-size:8px;color:var(--purple);opacity:0.5;
  text-transform:uppercase;letter-spacing:2px}
.boss-section h3{font-family:'Orbitron';font-size:13px;font-weight:800;color:var(--purple);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.boss-section .challenge{font-size:13px;color:var(--text);margin-bottom:14px;line-height:1.5}
.boss-result{display:flex;gap:10px}
.boss-btn{flex:1;padding:10px;border-radius:8px;font-family:'Orbitron';font-size:10px;
  font-weight:700;cursor:pointer;transition:all 0.3s;text-transform:uppercase;letter-spacing:1px;border:none}

/* Streak Section */
.streak-section{margin:12px 0;padding:16px;border:1px solid rgba(255,215,0,0.12);border-radius:10px;
  background:rgba(255,215,0,0.04);display:flex;align-items:center;justify-content:space-between}
.streak-section .left{display:flex;align-items:center;gap:12px}
.streak-section .fire{font-size:28px}
.streak-section .count{font-family:'Orbitron';font-size:22px;font-weight:900;color:var(--gold)}
.streak-section .lbl{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:1px}
.streak-section .bonus{font-family:'Share Tech Mono';font-size:13px;color:var(--green);font-weight:700}

/* Daily Log */
.dl-section{margin:16px 0}
.dl-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.dl-header h3{font-family:'Orbitron';font-size:11px;color:var(--cyan);text-transform:uppercase;letter-spacing:1px}
.dl-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.dl-day{padding:10px 4px;border:1px solid var(--border);border-radius:8px;text-align:center;
  background:var(--card);transition:all 0.3s}
.dl-day.today{animation:todayPulse 2.5s ease infinite}
.dl-day .day-label{font-family:'Orbitron';font-size:8px;color:var(--sub);text-transform:uppercase;margin-bottom:6px}
.dl-day .mood-pick{display:flex;flex-direction:column;gap:3px;align-items:center}
.dl-day .mood-pick span{cursor:pointer;font-size:16px;opacity:0.3;transition:all 0.2s}
.dl-day .mood-pick span.sel{opacity:1;transform:scale(1.2)}
.dl-day .mood-pick span:hover{opacity:0.8}
.dl-day .energy-pick{display:flex;flex-direction:column;gap:2px;margin-top:6px}
.dl-day .energy-pick button{border:none;padding:3px;border-radius:3px;font-size:8px;
  cursor:pointer;transition:all 0.2s;background:rgba(255,255,255,0.05);color:var(--sub);
  font-family:'Rajdhani';font-weight:600}
.dl-day .energy-pick button.sel{color:var(--cyan);background:rgba(0,245,255,0.12)}
.dl-day .note-input{width:100%;margin-top:6px;padding:4px;border:1px solid var(--border);
  border-radius:4px;background:transparent;color:var(--text);font-size:9px;font-family:'Rajdhani';
  outline:none;text-align:center}
.dl-day .note-input:focus{border-color:var(--cyan)}

/* History */
.history-card{margin-bottom:12px;padding:16px;border:1px solid var(--border);border-radius:10px;
  background:var(--card);cursor:pointer;transition:all 0.3s}
.history-card:hover{border-color:var(--cyan);background:rgba(0,245,255,0.04)}

/* Settings */
.settings-section{margin:16px 0}
.setting-group{margin-bottom:16px;padding:16px;border:1px solid var(--border);border-radius:10px;background:var(--card)}
.setting-group h3{font-family:'Orbitron';font-size:10px;color:var(--cyan);text-transform:uppercase;
  letter-spacing:1px;margin-bottom:12px}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,0.03)}
.setting-row:last-child{border:none}
.setting-row label{font-size:12px;color:var(--text);font-weight:600}
.setting-row input,.setting-row select{padding:6px 10px;border:1px solid var(--border);border-radius:6px;
  background:rgba(255,255,255,0.05);color:var(--text);font-size:12px;font-family:'Rajdhani';outline:none}
.setting-row input:focus,.setting-row select:focus{border-color:var(--cyan)}

/* Buttons */
.btn{padding:10px 20px;border:1px solid var(--border);border-radius:8px;background:transparent;
  color:var(--text);font-family:'Orbitron';font-size:10px;font-weight:700;cursor:pointer;
  transition:all 0.3s;text-transform:uppercase;letter-spacing:1px}
.btn:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-danger{border-color:rgba(255,23,68,0.3);color:var(--red)}
.btn-danger:hover{background:rgba(255,23,68,0.1);border-color:var(--red)}
.btn-primary{border-color:var(--cyan);color:var(--cyan)}
.btn-primary:hover{background:rgba(0,245,255,0.1)}

/* Weekly Summary */
.summary-section{margin:16px 0;padding:18px;border:1px solid var(--border);border-radius:12px;background:var(--card)}
.summary-section h3{font-family:'Orbitron';font-size:11px;color:var(--cyan);text-transform:uppercase;
  letter-spacing:1px;margin-bottom:14px}
.summary-cat{display:flex;justify-content:space-between;align-items:center;padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,0.03)}
.summary-cat:last-child{border:none}
.summary-cat .name{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
.summary-cat .bar{flex:1;margin:0 14px;height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden}
.summary-cat .bar-fill{height:100%;border-radius:3px;transition:width 0.5s ease}
.summary-cat .pct{font-family:'Share Tech Mono';font-size:13px;font-weight:700;min-width:40px;text-align:right}

/* Responsive */
@media(max-width:480px){
  .dl-grid{grid-template-columns:repeat(7,1fr);gap:3px}
  .dl-day{padding:6px 2px}
  .dl-day .mood-pick span{font-size:13px}
  .hunter-card .hc-stats{grid-template-columns:repeat(2,1fr)}
  .tabs{gap:4px}
  .tab{padding:8px 12px;font-size:9px}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState, useEffect, useRef, useCallback, useMemo} = React;

// ═══════════════════════════════════════════════
// SOLO LEVELING CONFIG
// ═══════════════════════════════════════════════
const RANKS = [
  {name:"E-Rank",min:0,max:99,color:"#576574",bg:"rgba(87,101,116,0.15)",border:"rgba(87,101,116,0.3)"},
  {name:"D-Rank",min:100,max:299,color:"#2979ff",bg:"rgba(41,121,255,0.15)",border:"rgba(41,121,255,0.3)"},
  {name:"C-Rank",min:300,max:599,color:"#00e676",bg:"rgba(0,230,118,0.15)",border:"rgba(0,230,118,0.3)"},
  {name:"B-Rank",min:600,max:999,color:"#ffd700",bg:"rgba(255,215,0,0.15)",border:"rgba(255,215,0,0.3)"},
  {name:"A-Rank",min:1000,max:1499,color:"#ff9100",bg:"rgba(255,145,0,0.15)",border:"rgba(255,145,0,0.3)"},
  {name:"S-Rank",min:1500,max:2499,color:"#a855f7",bg:"rgba(168,85,247,0.15)",border:"rgba(168,85,247,0.3)"},
  {name:"National",min:2500,max:3999,color:"#ff1744",bg:"rgba(255,23,68,0.15)",border:"rgba(255,23,68,0.3)"},
  {name:"Monarch",min:4000,max:Infinity,color:"#00f5ff",bg:"rgba(0,245,255,0.15)",border:"rgba(0,245,255,0.3)"},
];

const HUNTER_TITLES = {
  unlock:[
    {id:"first_blood",name:"First Blood",desc:"Complete first day 100%",check:(s)=>s.perfectDays>=1},
    {id:"consistent",name:"The Consistent",desc:"7-day streak",check:(s)=>s.streak>=7},
    {id:"iron_will",name:"Iron Will",desc:"14-day streak",check:(s)=>s.streak>=14},
    {id:"unstoppable",name:"Unstoppable",desc:"30-day streak",check:(s)=>s.streak>=30},
    {id:"d_rank_hunter",name:"D-Rank Hunter",desc:"Reach D-Rank",check:(s)=>s.rankIdx>=1},
    {id:"c_rank_hunter",name:"C-Rank Hunter",desc:"Reach C-Rank",check:(s)=>s.rankIdx>=2},
    {id:"b_rank_hunter",name:"B-Rank Hunter",desc:"Reach B-Rank",check:(s)=>s.rankIdx>=3},
    {id:"boss_slayer",name:"Boss Slayer",desc:"Win 3 boss fights",check:(s)=>s.bossWins>=3},
    {id:"elite_hunter",name:"Elite Hunter",desc:"5 weeks above 80%",check:(s)=>s.weeksAbove80>=5},
    {id:"shadow_monarch",name:"Shadow Monarch",desc:"Reach Monarch rank",check:(s)=>s.rankIdx>=7},
  ],
  shame:[
    {id:"slacker",name:"The Slacker",desc:"Miss 3 consecutive days",check:(s)=>s.consecutiveMiss>=3},
    {id:"fallen",name:"The Fallen",desc:"Get rank demoted",check:(s)=>s.demotions>=1},
    {id:"quitter",name:"The Quitter",desc:"Miss entire week",check:(s)=>s.fullWeekMiss>=1},
    {id:"dungeon_prisoner",name:"Dungeon Prisoner",desc:"Trigger Dungeon Break 3 times",check:(s)=>s.dungeonBreaks>=3},
  ]
};

const BOSS_CHALLENGES = [
  {name:"Gate Boss: Igris",desc:"Score 90%+ this week across ALL categories",threshold:90,reward:150,penalty:-100},
  {name:"Red Gate: Baran",desc:"Complete every single task for 3 consecutive days",threshold:3,reward:200,penalty:-120},
  {name:"Demon King: Antares",desc:"Achieve 100% on any single day",threshold:100,reward:250,penalty:-150},
  {name:"Double Dungeon",desc:"Score 80%+ in EVERY category independently",threshold:80,reward:180,penalty:-100},
  {name:"Jeju Island Raid",desc:"Maintain 85%+ average for the entire week",threshold:85,reward:200,penalty:-130},
];

const MOODS = ["😫","😔","😐","🙂","😊","😄","🔥"];
const ENERGY = ["Low","Med","High"];
const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const AVATARS = ["⚔️","🗡️","🛡️","🏹","🔮","👑","💀","🐉","🦅","🌙"];

const DEFAULT_CATS = [
  {id:"fitness",label:"Fitness",emoji:"💪",days:7,color:"#00e676",
   tasks:["Do Workout","Log Meal 1","Log Meal 2","Log Meal 3","Hit Calories","Hit Protein"]},
  {id:"emotional",label:"Emotional Growth",emoji:"🧠",days:7,color:"#a855f7",
   tasks:["Write Journal","Talk to Family/Friend","Play a Match"]},
  {id:"financial",label:"Financial Growth",emoji:"💰",days:6,color:"#ffd700",
   tasks:["Go to Work","Log Hours","Next Practical Step"]},
];

// ═══════════════════════════════════════════════
// UTILITY FUNCTIONS
// ═══════════════════════════════════════════════
function getWeekId(d=new Date()){
  const dt=new Date(d);dt.setHours(0,0,0,0);
  dt.setDate(dt.getDate()+3-((dt.getDay()+6)%7));
  const w1=new Date(dt.getFullYear(),0,4);
  const wn=1+Math.round(((dt-w1)/864e5-3+((w1.getDay()+6)%7))/7);
  return `${dt.getFullYear()}-W${String(wn).padStart(2,"0")}`;
}
function getWeekRange(wid){
  const[y,ws]=wid.split("-W");
  const j4=new Date(parseInt(y),0,4);
  const dow=j4.getDay()||7;
  const mon=new Date(j4);mon.setDate(j4.getDate()-dow+1+(parseInt(ws)-1)*7);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const f=d=>d.toLocaleDateString("en-AU",{day:"numeric",month:"short"});
  return `${f(mon)} — ${f(sun)}`;
}
function getWeekMonday(wid){
  const[y,ws]=wid.split("-W");
  const j4=new Date(parseInt(y),0,4);
  const dow=j4.getDay()||7;
  const mon=new Date(j4);mon.setDate(j4.getDate()-dow+1+(parseInt(ws)-1)*7);
  return mon;
}
function getTodayIndex(){const d=new Date().getDay();return d===0?6:d-1;}
function getRank(xp){for(let i=RANKS.length-1;i>=0;i--){if(xp>=RANKS[i].min)return{...RANKS[i],idx:i};}return{...RANKS[0],idx:0};}
function getRankProgress(xp){const r=getRank(xp);if(r.max===Infinity)return 100;return Math.min(100,Math.round((xp-r.min)/(r.max-r.min+1)*100));}

function load(key,def){try{const d=localStorage.getItem(key);return d?JSON.parse(d):def;}catch{return def;}}
function save(key,val){localStorage.setItem(key,JSON.stringify(val));}

// ═══════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════
function App(){
  const CURRENT_WEEK = getWeekId();
  const todayIdx = getTodayIndex();

  // ── STATE ──
  const [state, _setState] = useState(()=>{
    const def = {
      categories: DEFAULT_CATS,
      weeks: {},
      meta: {},
      hunter: {
        name: "Hunter",
        avatar: "⚔️",
        xp: 0,
        titles: [],
        shameTitles: [],
        streak: 0,
        bestStreak: 0,
        totalDaysCompleted: 0,
        perfectDays: 0,
        bossWins: 0,
        bossLosses: 0,
        demotions: 0,
        dungeonBreaks: 0,
        fullWeekMiss: 0,
        consecutiveMiss: 0,
        weeksAbove80: 0,
        penaltyLog: [],
        bossHistory: [],
        lastProcessedWeek: null,
        previousRankIdx: 0,
      }
    };
    return load("sl_tracker_v4", def);
  });

  const setState = useCallback((fn)=>{
    _setState(prev=>{
      const next = typeof fn==='function' ? fn(prev) : fn;
      save("sl_tracker_v4", next);
      return next;
    });
  },[]);

  const [view, setView] = useState("tracker");
  const [showRankDown, setShowRankDown] = useState(false);
  const [rankDownInfo, setRankDownInfo] = useState(null);
  const [selectedWeek, setSelectedWeek] = useState(CURRENT_WEEK);

  const cats = state.categories;
  const hunter = state.hunter;

  // ── ENSURE WEEK DATA ──
  useEffect(()=>{
    if(!state.weeks[CURRENT_WEEK]){
      setState(s=>{
        const ns={...s,weeks:{...s.weeks}};
        ns.weeks[CURRENT_WEEK] = {};
        s.categories.forEach(c=>{
          ns.weeks[CURRENT_WEEK][c.id]={};
          c.tasks.forEach(t=>{ns.weeks[CURRENT_WEEK][c.id][t]=Array(c.days).fill(false);});
        });
        return ns;
      });
    }
  },[CURRENT_WEEK]);

  // ── SCORING ──
  function getScore(wid, cat){
    const wd=state.weeks[wid];if(!wd)return{done:0,total:0,pct:0};
    let done=0,total=0;
    cat.tasks.forEach(t=>{
      const arr=wd[cat.id]?.[t]||[];
      for(let i=0;i<cat.days;i++){total++;if(arr[i])done++;}
    });
    return{done,total,pct:total?Math.round(done/total*100):0};
  }
  function getOverall(wid){
    let d=0,t=0;
    cats.forEach(c=>{const s=getScore(wid,c);d+=s.done;t+=s.total;});
    return{done:d,total:t,pct:t?Math.round(d/t*100):0};
  }
  function getDayScore(wid, dayIdx){
    const wd=state.weeks[wid];if(!wd)return{done:0,total:0,pct:0};
    let done=0,total=0;
    cats.forEach(c=>{
      if(dayIdx < c.days){
        c.tasks.forEach(t=>{
          total++;
          if(wd[c.id]?.[t]?.[dayIdx])done++;
        });
      }
    });
    return{done,total,pct:total?Math.round(done/total*100):0};
  }

  // ═══════════════════════════════════════════════
  // XP CALCULATION ENGINE (recalculates from scratch)
  // ═══════════════════════════════════════════════
  function recalculateXP(stateObj){
    const s = stateObj || state;
    let xp = 0;
    let streak = 0;
    let bestStreak = 0;
    let perfectDays = 0;
    let totalDaysCompleted = 0;
    let consecutiveMiss = 0;
    let maxConsecutiveMiss = 0;
    let dungeonBreaks = 0;
    let demotions = 0;
    let fullWeekMiss = 0;
    let weeksAbove80 = 0;
    let bossWins = 0;
    let bossLosses = 0;
    let prevRankIdx = 0;
    const penaltyLog = [];
    const titles = [];
    const shameTitles = [];

    // Sort weeks chronologically
    const sortedWeeks = Object.keys(s.weeks).sort();

    sortedWeeks.forEach(wid=>{
      const wd = s.weeks[wid];
      if(!wd) return;
      const overall = getOverallFromState(s, wid);
      let weekMissedAll = true;
      let weekConsecutiveMiss = 0;
      let maxWeekConsecMiss = 0;

      // Process each day
      const maxDays = 7;
      for(let d=0; d<maxDays; d++){
        const dayScore = getDayScoreFromState(s, wid, d);
        if(dayScore.total === 0) continue;

        if(dayScore.done === dayScore.total){
          perfectDays++;
          totalDaysCompleted++;
          streak++;
          bestStreak = Math.max(bestStreak, streak);
          consecutiveMiss = 0;
          weekConsecutiveMiss = 0;
          weekMissedAll = false;
          // XP for completed tasks
          xp += dayScore.done * 2; // +2 XP per completed task
        } else if(dayScore.done > 0){
          totalDaysCompleted++;
          weekMissedAll = false;
          weekConsecutiveMiss = 0;
          consecutiveMiss = 0;
          // XP for partial
          xp += dayScore.done * 2;
          // Penalty for missed tasks
          const missed = dayScore.total - dayScore.done;
          xp -= missed * 5; // -5 per missed task
          penaltyLog.push({week:wid,day:DAYS[d],type:"Missed Tasks",amt:-(missed*5)});
        } else {
          // Fully missed day
          // Only count as missed if we're past this day in current week, or it's a past week
          const isCurrentWeek = wid === getWeekId();
          const isPastDay = !isCurrentWeek || d <= getTodayIndex();
          if(isPastDay){
            consecutiveMiss++;
            weekConsecutiveMiss++;
            maxWeekConsecMiss = Math.max(maxWeekConsecMiss, weekConsecutiveMiss);
            maxConsecutiveMiss = Math.max(maxConsecutiveMiss, consecutiveMiss);
            streak = 0;
            // -50 shadow penalty for full day miss
            xp -= 50;
            penaltyLog.push({week:wid,day:DAYS[d],type:"Full Day Miss (Shadow)",amt:-50});
            // -5 per each task that day too
            xp -= dayScore.total * 5;
            penaltyLog.push({week:wid,day:DAYS[d],type:"Missed Tasks",amt:-(dayScore.total*5)});
          }
        }

        // Dungeon Break: 3 consecutive days miss
        if(consecutiveMiss >= 3 && consecutiveMiss % 3 === 0){
          dungeonBreaks++;
          xp -= 100;
          penaltyLog.push({week:wid,day:DAYS[d],type:"⚠️ DUNGEON BREAK",amt:-100});
        }
      }

      // Full week miss check
      if(weekMissedAll && wid !== getWeekId()){
        fullWeekMiss++;
      }

      // Week above 80%
      if(overall.pct >= 80) weeksAbove80++;

      // Streak bonus (per week with >=50%)
      if(overall.pct >= 50 && streak >= 7){
        const bonus = Math.min(streak * 5, 100);
        xp += bonus;
      }

      // Boss fight results
      const bh = s.hunter.bossHistory || [];
      const weekBoss = bh.find(b=>b.week===wid);
      if(weekBoss){
        if(weekBoss.won){bossWins++;xp+=weekBoss.reward||100;}
        else{bossLosses++;xp+=weekBoss.penalty||(-80);}
      }

      // Rank demotion check
      const currentRankIdx = getRank(Math.max(0,xp)).idx;
      if(currentRankIdx < prevRankIdx) demotions++;
      prevRankIdx = currentRankIdx;
    });

    xp = Math.max(0, xp);

    // Calculate titles
    const titleState = {
      perfectDays, streak, rankIdx: getRank(xp).idx,
      bossWins, weeksAbove80, consecutiveMiss: maxConsecutiveMiss,
      demotions, fullWeekMiss, dungeonBreaks
    };
    HUNTER_TITLES.unlock.forEach(t=>{if(t.check(titleState))titles.push(t.id);});
    HUNTER_TITLES.shame.forEach(t=>{if(t.check(titleState))shameTitles.push(t.id);});

    return {
      xp, streak, bestStreak, perfectDays, totalDaysCompleted,
      consecutiveMiss, dungeonBreaks, demotions, fullWeekMiss,
      weeksAbove80, bossWins, bossLosses, titles, shameTitles,
      penaltyLog: penaltyLog.slice(-20), previousRankIdx: prevRankIdx,
    };
  }

  function getOverallFromState(s, wid){
    const wd=s.weeks[wid];if(!wd)return{done:0,total:0,pct:0};
    let d=0,t=0;
    s.categories.forEach(c=>{
      c.tasks.forEach(task=>{
        const arr=wd[c.id]?.[task]||[];
        for(let i=0;i<c.days;i++){t++;if(arr[i])d++;}
      });
    });
    return{done:d,total:t,pct:t?Math.round(d/t*100):0};
  }
  function getDayScoreFromState(s, wid, dayIdx){
    const wd=s.weeks[wid];if(!wd)return{done:0,total:0,pct:0};
    let done=0,total=0;
    s.categories.forEach(c=>{
      if(dayIdx<c.days){
        c.tasks.forEach(t=>{total++;if(wd[c.id]?.[t]?.[dayIdx])done++;});
      }
    });
    return{done,total,pct:total?Math.round(done/total*100):0};
  }

  // ── TOGGLE CHECKBOX ──
  function toggle(catId, task, dayIdx){
    if(selectedWeek !== CURRENT_WEEK) return;
    setState(prev=>{
      const ns = JSON.parse(JSON.stringify(prev));
      if(!ns.weeks[CURRENT_WEEK]) return prev;
      if(!ns.weeks[CURRENT_WEEK][catId]) ns.weeks[CURRENT_WEEK][catId]={};
      if(!ns.weeks[CURRENT_WEEK][catId][task]) ns.weeks[CURRENT_WEEK][catId][task]=Array(7).fill(false);
      ns.weeks[CURRENT_WEEK][catId][task][dayIdx] = !ns.weeks[CURRENT_WEEK][catId][task][dayIdx];

      // Recalculate everything
      const calc = recalculateXP(ns);
      const oldRankIdx = getRank(prev.hunter.xp).idx;
      const newRankIdx = getRank(calc.xp).idx;

      ns.hunter = {...ns.hunter, ...calc};

      // Check rank demotion for overlay
      if(newRankIdx < oldRankIdx){
        setTimeout(()=>{
          setRankDownInfo({from:RANKS[oldRankIdx].name, to:RANKS[newRankIdx].name});
          setShowRankDown(true);
        }, 300);
      }

      return ns;
    });
  }

  // ── RESET WEEK (BUG FIX: recalculates XP) ──
  function resetWeek(){
    if(!window.confirm("⚠️ RESET THIS WEEK? All progress will be lost. XP will be recalculated.")) return;
    setState(prev=>{
      const ns = JSON.parse(JSON.stringify(prev));
      // Clear week data
      ns.weeks[CURRENT_WEEK] = {};
      ns.categories.forEach(c=>{
        ns.weeks[CURRENT_WEEK][c.id]={};
        c.tasks.forEach(t=>{ns.weeks[CURRENT_WEEK][c.id][t]=Array(c.days).fill(false);});
      });
      // Clear meta for week
      if(ns.meta[CURRENT_WEEK]) delete ns.meta[CURRENT_WEEK];
      // Recalculate XP from scratch
      const calc = recalculateXP(ns);
      ns.hunter = {...ns.hunter, ...calc};
      return ns;
    });
  }

  // ── BOSS FIGHT ──
  function getCurrentBoss(){
    const weekNum = parseInt(CURRENT_WEEK.split("-W")[1]);
    return BOSS_CHALLENGES[weekNum % BOSS_CHALLENGES.length];
  }
  function isBossFought(wid){
    return (state.hunter.bossHistory||[]).some(b=>b.week===wid);
  }
  function fightBoss(won){
    const boss = getCurrentBoss();
    setState(prev=>{
      const ns = JSON.parse(JSON.stringify(prev));
      if(!ns.hunter.bossHistory) ns.hunter.bossHistory = [];
      ns.hunter.bossHistory.push({
        week: CURRENT_WEEK, boss: boss.name, won,
        reward: won ? boss.reward : 0,
        penalty: won ? 0 : boss.penalty,
      });
      const calc = recalculateXP(ns);
      ns.hunter = {...ns.hunter, ...calc};
      return ns;
    });
  }

  // ── DAILY LOG ──
  function getMeta(wid, key){return state.meta?.[wid]?.[key] ?? null;}
  function setMeta(wid, key, val){
    setState(prev=>{
      const ns={...prev, meta:{...prev.meta}};
      if(!ns.meta[wid]) ns.meta[wid]={};
      ns.meta[wid]={...ns.meta[wid],[key]:val};
      return ns;
    });
  }
  function getDailyLog(wid, dayIdx){
    const dl = getMeta(wid, "dailyLog") || {};
    return dl[dayIdx] || {};
  }
  function setDailyLog(wid, dayIdx, field, val){
    const dl = getMeta(wid, "dailyLog") || {};
    const dayData = {...(dl[dayIdx]||{}), [field]:val};
    setMeta(wid, "dailyLog", {...dl, [dayIdx]:dayData});
  }

  // ── HUNTER PROFILE ──
  function updateHunterName(name){
    setState(prev=>({...prev,hunter:{...prev.hunter,name}}));
  }
  function updateHunterAvatar(av){
    setState(prev=>({...prev,hunter:{...prev.hunter,avatar:av}}));
  }

  // ── DERIVED VALUES ──
  const rank = getRank(hunter.xp);
  const rankProgress = getRankProgress(hunter.xp);
  const overall = getOverall(selectedWeek);
  const isCurrentWeek = selectedWeek === CURRENT_WEEK;

  // Warning conditions
  const isRankFalling = hunter.consecutiveMiss >= 2 || (overall.pct < 40 && todayIdx >= 3);
  const isDungeonRisk = hunter.consecutiveMiss >= 2;

  // Active title
  const activeTitle = hunter.titles?.length > 0
    ? HUNTER_TITLES.unlock.find(t=>t.id===hunter.titles[hunter.titles.length-1])
    : null;
  const activeShame = hunter.shameTitles?.length > 0
    ? HUNTER_TITLES.shame.find(t=>t.id===hunter.shameTitles[hunter.shameTitles.length-1])
    : null;

  // ═══════════════════════════════════════════════
  // RENDER: SVG Circle
  // ═══════════════════════════════════════════════
  function CircleSVG({pct, color, size=80}){
    const sw=6, r=(size-sw)/2, c=2*Math.PI*r, off=c-(pct/100)*c;
    return(
      <div className="circ-wrap" style={{width:size,height:size}}>
        <svg width={size} height={size}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth={sw}/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw}
            strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round"
            transform={`rotate(-90 ${size/2} ${size/2})`}
            style={{transition:'stroke-dashoffset 0.6s ease'}}/>
        </svg>
        <span className="pct-text" style={{color}}>{pct}%</span>
      </div>
    );
  }

  // ═══════════════════════════════════════════════
  // RENDER: Hunter ID Card
  // ═══════════════════════════════════════════════
  function HunterIDCard(){
    return(
      <div className="hunter-card fu">
        <div className="hc-top">
          <div className="avatar">{hunter.avatar}</div>
          <div className="hc-info">
            <h2>{hunter.name}</h2>
            <span className="rank-badge" style={{background:rank.bg,color:rank.color,border:`1px solid ${rank.border}`}}>
              {rank.name}
            </span>
            {activeTitle && <span className="title-badge">🏅 {activeTitle.name}</span>}
            {activeShame && <span className="title-badge" style={{color:'var(--red)'}}>💀 {activeShame.name}</span>}
          </div>
        </div>
        <div className="hc-stats">
          <div className="hc-stat">
            <div className="val" style={{color:rank.color}}>{hunter.xp}</div>
            <div className="lbl">XP</div>
          </div>
          <div className="hc-stat">
            <div className="val" style={{color:'var(--gold)'}}>{hunter.streak}🔥</div>
            <div className="lbl">Streak</div>
          </div>
          <div className="hc-stat">
            <div className="val" style={{color:'var(--green)'}}>{hunter.bossWins || 0}</div>
            <div className="lbl">Boss W</div>
          </div>
          <div className="hc-stat">
            <div className="val" style={{color:'var(--purple)'}}>{hunter.perfectDays || 0}</div>
            <div className="lbl">Perfect</div>
          </div>
        </div>
      </div>
    );
  }

  // ═══════════════════════════════════════════════
  // RENDER: XP Bar
  // ═══════════════════════════════════════════════
  function XPBar(){
    const nextRank = rank.idx < RANKS.length-1 ? RANKS[rank.idx+1] : null;
    return(
      <div className="xp-section fu" style={{animationDelay:'0.05s'}}>
        <div className="xp-info">
          <span className="xp-label">XP Progress</span>
          <span className="xp-val">{hunter.xp} / {nextRank ? nextRank.min : '∞'} XP</span>
        </div>
        <div className="xp-bar-outer">
          <div className="xp-bar-inner" style={{
            width:`${rankProgress}%`,
            background:`linear-gradient(90deg, ${rank.color}, ${rank.color}88)`
          }}/>
        </div>
        {nextRank && <div style={{fontSize:9,color:'var(--sub)',marginTop:4,textAlign:'right',fontFamily:'Share Tech Mono'}}>
          {nextRank.min - hunter.xp} XP to {nextRank.name}
        </div>}
      </div>
    );
  }

  // ═══════════════════════════════════════════════
  // RENDER: Warning Banner
  // ═══════════════════════════════════════════════
  function WarningBanner(){
    if(!isRankFalling || !isCurrentWeek) return null;
    return(
      <div className="warning-banner fu" style={{animationDelay:'0.1s'}}>
        <span className="icon">⚠️</span>
        <div>
          <div className="msg">YOUR RANK IS FALLING</div>
          <div style={{fontSize:11,color:'rgba(255,23,68,0.7)',marginTop:2}}>
            {hunter.consecutiveMiss >= 2 
              ? `${hunter.consecutiveMiss} days missed. ${3-hunter.consecutiveMiss} more = DUNGEON BREAK (-100 XP)`
              : `Week progress at ${overall.pct}%. Pick it up or lose your rank.`}
          </div>
        </div>
      </div>
    );
  }

  // ═══════════════════════════════════════════════
  // RENDER: Penalty Log
  // ═══════════════════════════════════════════════
  function PenaltyLog(){
    const logs = (hunter.penaltyLog || []).filter(p=>p.week===selectedWeek);
    if(logs.length === 0) return null;
    return(
      <div className="penalty-log fu" style={{animationDelay:'0.15s'}}>
        <h3>☠️ Penalty Log — {selectedWeek}</h3>
        {logs.map((p,i)=>(
          <div className="penalty-item" key={i}>
            <span>{p.day} — {p.type}</span>
            <span className="amt">{p.amt} XP</span>
          </div>
        ))}
      </div>
    );
  }

  // ═══════════════════════════════════════════════
  // RENDER: Boss Fight
  // ═══════════════════════════════════════════════
  function BossFight(){
    if(!isCurrentWeek) return null;
    const boss = getCurrentBoss();
    const fought = isBossFought(CURRENT_WEEK);
    const result = (hunter.bossHistory||[]).find(b=>b.week===CURRENT_WEEK);
    return(
      <div className="boss-section fu" style={{animationDelay:'0.2s'}}>
        <h3>⚔️ {boss.name}</h3>
        <div className="challenge">{boss.desc}</div>
        {fought ? (
          <div style={{padding:12,borderRadius:8,textAlign:'center',
            background:result?.won ? 'rgba(0,230,118,0.1)' : 'rgba(255,23,68,0.1)',
            border:`1px solid ${result?.won ? 'rgba(0,230,118,0.3)' : 'rgba(255,23,68,0.3)'}`,
            fontFamily:'Orbitron',fontSize:12,fontWeight:700,
            color:result?.won ? 'var(--green)' : 'var(--red)'}}>
            {result?.won ? `✅ BOSS DEFEATED — +${result.reward} XP` : `💀 BOSS WON — ${result.penalty} XP`}
          </div>
        ) : (
          <div className="boss-result">
            <button className="boss-btn" onClick={()=>fightBoss(true)}
              style={{background:'rgba(0,230,118,0.15)',color:'var(--green)'}}>
              ✅ Won (+{boss.reward} XP)
            </button>
            <button className="boss-btn" onClick={()=>fightBoss(false)}
              style={{background:'rgba(255,23,68,0.15)',color:'var(--red)'}}>
              💀 Lost ({boss.penalty} XP)
            </button>
          </div>
        )}
      </div>
    );
  }

  // ═══════════════════════════════════════════════
  // RENDER: Streak Section
  // ═══════════════════════════════════════════════
  function StreakSection(){
    const streakBonus = hunter.streak >= 7 ? Math.min(hunter.streak * 5, 100) : 0;
    return(
      <div className="streak-section fu" style={{animationDelay:'0.1s'}}>
        <div className="left">
          <span className="fire">{hunter.streak > 0 ? '🔥' : '❄️'}</span>
          <div>
            <div className="count">{hunter.streak}</div>
            <div className="lbl">Day Streak {hunter.bestStreak > hunter.streak ? `(Best: ${hunter.bestStreak})` : ''}</div>
          </div>
        </div>
        {streakBonus > 0 && <div className="bonus">+{streakBonus} XP/week</div>}
        {hunter.streak === 0 && hunter.bestStreak > 0 && (
          <div style={{fontFamily:'Share Tech Mono',fontSize:11,color:'var(--red)'}}>STREAK BROKEN</div>
        )}
      </div>
    );
  }

  // ═══════════════════════════════════════════════
  // RENDER: Category Card
  // ═══════════════════════════════════════════════
  function CategoryCard({cat}){
    const score = getScore(selectedWeek, cat);
    const wd = state.weeks[selectedWeek];
    return(
      <div className="cat-card fu" style={{animationDelay:'0.15s'}}>
        <div className="cat-header">
          <div className="left">
            <span className="emoji">{cat.emoji}</span>
            <span className="label">{cat.label}</span>
          </div>
          <span className="pct" style={{color:cat.color}}>{score.pct}%
            <span style={{fontSize:10,color:'var(--sub)',marginLeft:4}}>{score.done}/{score.total}</span>
          </span>
        </div>
        <div className="cat-progress">
          <div className="cat-progress-fill" style={{width:`${score.pct}%`,background:cat.color}}/>
        </div>
        <div className="task-grid">
          <table>
            <thead>
              <tr>
                <th style={{textAlign:'left',paddingLeft:14}}>Task</th>
                {DAYS.slice(0,cat.days).map((d,i)=>(
                  <th key={i} className={i===todayIdx && isCurrentWeek ? 'today-col' : ''}>{d}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {cat.tasks.map(task=>(
                <tr key={task}>
                  <td>{task}</td>
                  {Array.from({length:cat.days}).map((_,di)=>{
                    const checked = wd?.[cat.id]?.[task]?.[di] || false;
                    const isPast = !isCurrentWeek || di < todayIdx;
                    const isMissed = isPast && !checked && isCurrentWeek;
                    return(
                      <td key={di} className={di===todayIdx && isCurrentWeek ? 'today-col' : ''}>
                        <button
                          className={`cbx ${checked?'checked':''} ${isMissed?'missed':''}`}
                          onClick={()=>toggle(cat.id, task, di)}
                          disabled={!isCurrentWeek}
                        >{checked ? '✓' : isMissed ? '✗' : ''}</button>
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    );
  }

  // ═══════════════════════════════════════════════
  // RENDER: Daily Log
  // ═══════════════════════════════════════════════
  function DailyLog(){
    return(
      <div className="dl-section fu" style={{animationDelay:'0.25s'}}>
        <div className="dl-header">
          <h3>📋 Daily Log</h3>
        </div>
        <div className="dl-grid">
          {DAYS.map((day,di)=>{
            const log = getDailyLog(selectedWeek, di);
            const isToday = di === todayIdx && isCurrentWeek;
            return(
              <div className={`dl-day ${isToday ? 'today' : ''}`} key={di}>
                <div className="day-label">{day}</div>
                <div className="mood-pick">
                  {MOODS.map((m,mi)=>(
                    <span key={mi} className={log.mood===mi?'sel':''}
                      onClick={()=>isCurrentWeek && setDailyLog(selectedWeek,di,'mood',mi)}>{m}</span>
                  ))}
                </div>
                <div className="energy-pick">
                  {ENERGY.map((e,ei)=>(
                    <button key={ei} className={log.energy===ei?'sel':''}
                      onClick={()=>isCurrentWeek && setDailyLog(selectedWeek,di,'energy',ei)}>{e}</button>
                  ))}
                </div>
                <input className="note-input" placeholder="..." maxLength={50}
                  value={log.note||''} disabled={!isCurrentWeek}
                  onChange={e=>setDailyLog(selectedWeek,di,'note',e.target.value)}/>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ═══════════════════════════════════════════════
  // RENDER: Weekly Summary
  // ═══════════════════════════════════════════════
  function WeeklySummary(){
    return(
      <div className="summary-section fu" style={{animationDelay:'0.3s'}}>
        <h3>📊 Weekly Summary</h3>
        {cats.map(cat=>{
          const s = getScore(selectedWeek, cat);
          return(
            <div className="summary-cat" key={cat.id}>
              <div className="name"><span>{cat.emoji}</span>{cat.label}</div>
              <div className="bar">
                <div className="bar-fill" style={{width:`${s.pct}%`,background:cat.color}}/>
              </div>
              <div className="pct" style={{color:s.pct>=80?'var(--green)':s.pct>=50?'var(--gold)':'var(--red)'}}>
                {s.pct}%
              </div>
            </div>
          );
        })}
        <div style={{marginTop:14,paddingTop:14,borderTop:'1px solid var(--border)',
          display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontFamily:'Orbitron',fontSize:10,color:'var(--sub)',textTransform:'uppercase',letterSpacing:1}}>
              Overall
            </div>
            <div style={{fontFamily:'Orbitron',fontSize:20,fontWeight:900,color:rank.color,marginTop:2}}>
              {overall.pct}%
            </div>
          </div>
          <CircleSVG pct={overall.pct} color={rank.color}/>
        </div>
        {/* Weekly reflection textarea */}
        <div style={{marginTop:14}}>
          <textarea style={{width:'100%',minHeight:60,padding:10,border:'1px solid var(--border)',
            borderRadius:8,background:'rgba(255,255,255,0.03)',color:'var(--text)',fontSize:12,
            fontFamily:'Rajdhani',resize:'vertical',outline:'none'}}
            placeholder="Weekly reflection... What did you learn? What to improve?"
            value={getMeta(selectedWeek,'reflection')||''}
            onChange={e=>isCurrentWeek && setMeta(selectedWeek,'reflection',e.target.value)}
            disabled={!isCurrentWeek}/>
        </div>
      </div>
    );
  }

  // ═══════════════════════════════════════════════
  // RENDER: History View
  // ═══════════════════════════════════════════════
  function HistoryView(){
    const weeks = Object.keys(state.weeks).sort().reverse();
    return(
      <div className="fu">
        <div style={{fontFamily:'Orbitron',fontSize:12,color:'var(--cyan)',marginBottom:16,
          textTransform:'uppercase',letterSpacing:1}}>⏳ History Archive</div>
        {weeks.length === 0 && <div style={{color:'var(--sub)',textAlign:'center',padding:40}}>No history yet</div>}
        {weeks.map(wid=>{
          const o = getOverall(wid);
          const r = getRank(hunter.xp); // simplified
          const isCurrent = wid === CURRENT_WEEK;
          return(
            <div className="history-card" key={wid} onClick={()=>{setSelectedWeek(wid);setView('tracker');}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontFamily:'Orbitron',fontSize:12,fontWeight:700,color:isCurrent?'var(--cyan)':'var(--text)'}}>
                    {wid} {isCurrent && '📍'}
                  </div>
                  <div style={{fontSize:11,color:'var(--sub)',marginTop:2}}>{getWeekRange(wid)}</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontFamily:'Orbitron',fontSize:18,fontWeight:900,
                    color:o.pct>=80?'var(--green)':o.pct>=50?'var(--gold)':'var(--red)'}}>
                    {o.pct}%
                  </div>
                  <div style={{fontSize:10,color:'var(--sub)'}}>{o.done}/{o.total}</div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    );
  }

  // ═══════════════════════════════════════════════
  // RENDER: Hunter (Titles) View
  // ═══════════════════════════════════════════════
  function HunterView(){
    const titleState = {
      perfectDays: hunter.perfectDays||0, streak: hunter.streak||0,
      rankIdx: rank.idx, bossWins: hunter.bossWins||0,
      weeksAbove80: hunter.weeksAbove80||0,
      consecutiveMiss: hunter.consecutiveMiss||0,
      demotions: hunter.demotions||0, fullWeekMiss: hunter.fullWeekMiss||0,
      dungeonBreaks: hunter.dungeonBreaks||0,
    };
    return(
      <div className="fu">
        {/* Editable Hunter Profile */}
        <div className="setting-group" style={{marginBottom:16}}>
          <h3>⚙️ Hunter Profile</h3>
          <div className="setting-row">
            <label>Hunter Name</label>
            <input value={hunter.name} onChange={e=>updateHunterName(e.target.value)}
              style={{width:140}} maxLength={20}/>
          </div>
          <div style={{marginTop:10}}>
            <label style={{fontSize:12,color:'var(--text)',fontWeight:600}}>Avatar</label>
            <div style={{display:'flex',gap:8,marginTop:6,flexWrap:'wrap'}}>
              {AVATARS.map(av=>(
                <button key={av} onClick={()=>updateHunterAvatar(av)}
                  style={{width:40,height:40,borderRadius:8,border:`2px solid ${hunter.avatar===av?'var(--cyan)':'var(--border)'}`,
                    background:hunter.avatar===av?'rgba(0,245,255,0.1)':'transparent',
                    fontSize:20,cursor:'pointer',transition:'all 0.2s'}}>
                  {av}
                </button>
              ))}
            </div>
          </div>
        </div>

        {/* Unlockable Titles */}
        <div style={{fontFamily:'Orbitron',fontSize:11,color:'var(--cyan)',marginBottom:12,
          textTransform:'uppercase',letterSpacing:1}}>🏅 Hunter Titles</div>
        {HUNTER_TITLES.unlock.map(t=>{
          const unlocked = (hunter.titles||[]).includes(t.id);
          return(
            <div key={t.id} style={{display:'flex',alignItems:'center',gap:12,padding:10,marginBottom:6,
              borderRadius:8,border:'1px solid var(--border)',
              background:unlocked?'rgba(0,245,255,0.05)':'var(--card)',opacity:unlocked?1:0.4}}>
              <span style={{fontSize:20}}>{unlocked?'🏅':'🔒'}</span>
              <div>
                <div style={{fontFamily:'Orbitron',fontSize:11,fontWeight:700,
                  color:unlocked?'var(--gold)':'var(--sub)'}}>{t.name}</div>
                <div style={{fontSize:10,color:'var(--sub)'}}>{t.desc}</div>
              </div>
            </div>
          );
        })}

        {/* Shame Titles */}
        <div style={{fontFamily:'Orbitron',fontSize:11,color:'var(--red)',margin:'20px 0 12px',
          textTransform:'uppercase',letterSpacing:1}}>💀 Shame Titles</div>
        {HUNTER_TITLES.shame.map(t=>{
          const has = (hunter.shameTitles||[]).includes(t.id);
          return(
            <div key={t.id} style={{display:'flex',alignItems:'center',gap:12,padding:10,marginBottom:6,
              borderRadius:8,border:`1px solid ${has?'rgba(255,23,68,0.2)':'var(--border)'}`,
              background:has?'rgba(255,23,68,0.06)':'var(--card)',opacity:has?1:0.4}}>
              <span style={{fontSize:20}}>{has?'💀':'🔒'}</span>
              <div>
                <div style={{fontFamily:'Orbitron',fontSize:11,fontWeight:700,
                  color:has?'var(--red)':'var(--sub)'}}>{t.name}</div>
                <div style={{fontSize:10,color:'var(--sub)'}}>{t.desc}</div>
              </div>
            </div>
          );
        })}

        {/* Stats */}
        <div style={{marginTop:20,padding:16,border:'1px solid var(--border)',borderRadius:10,background:'var(--card)'}}>
          <div style={{fontFamily:'Orbitron',fontSize:11,color:'var(--cyan)',marginBottom:12,
            textTransform:'uppercase',letterSpacing:1}}>📊 Lifetime Stats</div>
          {[
            ['Total XP', hunter.xp],
            ['Current Rank', rank.name],
            ['Days Completed', hunter.totalDaysCompleted||0],
            ['Perfect Days', hunter.perfectDays||0],
            ['Current Streak', hunter.streak||0],
            ['Best Streak', hunter.bestStreak||0],
            ['Boss Wins', hunter.bossWins||0],
            ['Boss Losses', hunter.bossLosses||0],
            ['Rank Demotions', hunter.demotions||0],
            ['Dungeon Breaks', hunter.dungeonBreaks||0],
          ].map(([k,v])=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',
              borderBottom:'1px solid rgba(255,255,255,0.03)',fontSize:12}}>
              <span style={{color:'var(--sub)'}}>{k}</span>
              <span style={{fontFamily:'Share Tech Mono',fontWeight:700}}>{v}</span>
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ═══════════════════════════════════════════════
  // RENDER: Settings View
  // ═══════════════════════════════════════════════
  function SettingsView(){
    return(
      <div className="settings-section fu">
        <div className="setting-group">
          <h3>⚠️ Danger Zone</h3>
          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
            <button className="btn btn-danger" onClick={resetWeek}>Reset Current Week</button>
            <button className="btn btn-danger" onClick={()=>{
              if(window.confirm("⚠️ FACTORY RESET? This will delete ALL data permanently.")){
                localStorage.removeItem("sl_tracker_v4");
                window.location.reload();
              }
            }}>Factory Reset</button>
          </div>
        </div>
        <div className="setting-group">
          <h3>📋 Categories</h3>
          {cats.map(cat=>(
            <div key={cat.id} style={{padding:10,marginBottom:8,borderRadius:8,
              border:'1px solid var(--border)',background:'var(--card)'}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                <span>{cat.emoji}</span>
                <span style={{fontFamily:'Orbitron',fontSize:11,fontWeight:700,color:cat.color}}>{cat.label}</span>
                <span style={{fontSize:10,color:'var(--sub)',marginLeft:'auto'}}>{cat.days} days</span>
              </div>
              <div style={{fontSize:11,color:'var(--sub)'}}>
                {cat.tasks.join(' • ')}
              </div>
            </div>
          ))}
        </div>
        <div className="setting-group">
          <h3>ℹ️ Penalty Rules</h3>
          <div style={{fontSize:12,color:'var(--sub)',lineHeight:1.8}}>
            <div>✅ Completed task: <span style={{color:'var(--green)'}}>+2 XP</span></div>
            <div>❌ Missed task: <span style={{color:'var(--red)'}}>-5 XP</span></div>
            <div>💀 Full day miss: <span style={{color:'var(--red)'}}>-50 XP (shadow penalty)</span></div>
            <div>⚠️ 3-day consecutive miss: <span style={{color:'var(--red)'}}>-100 XP (Dungeon Break)</span></div>
            <div>🔥 Streak bonus (7+ days): <span style={{color:'var(--green)'}}>+streak×5 XP/week (max 100)</span></div>
            <div>⚔️ Boss Fight Win: <span style={{color:'var(--green)'}}>+150-250 XP</span></div>
            <div>💀 Boss Fight Loss: <span style={{color:'var(--red)'}}>-100 to -150 XP</span></div>
            <div>📉 Rank can DEMOTE if XP drops below threshold</div>
          </div>
        </div>
        <div className="setting-group">
          <h3>💾 Data</h3>
          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
            <button className="btn btn-primary" onClick={()=>{
              const blob = new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');a.href=url;
              a.download=`hunter-backup-${new Date().toISOString().slice(0,10)}.json`;
              a.click();URL.revokeObjectURL(url);
            }}>Export Backup</button>
            <button className="btn btn-primary" onClick={()=>{
              const input = document.createElement('input');input.type='file';input.accept='.json';
              input.onchange=e=>{
                const file=e.target.files[0];if(!file)return;
                const reader=new FileReader();
                reader.onload=ev=>{
                  try{
                    const data=JSON.parse(ev.target.result);
                    if(data.categories && data.weeks){
                      save("sl_tracker_v4",data);
                      window.location.reload();
                    }
                  }catch{alert("Invalid backup file");}
                };
                reader.readAsText(file);
              };
              input.click();
            }}>Import Backup</button>
          </div>
        </div>
      </div>
    );
  }

  // ═══════════════════════════════════════════════
  // MAIN RENDER
  // ═══════════════════════════════════════════════
  return(
    <div>
      {/* Rank Down Overlay */}
      {showRankDown && rankDownInfo && (
        <div className="overlay rank-down-overlay">
          <div className="rank-arrow">📉</div>
          <h1>RANK DOWN</h1>
          <p>{rankDownInfo.from} → {rankDownInfo.to}<br/>
          Your weakness has consequences. Fight harder or fall further into the abyss.</p>
          <button onClick={()=>setShowRankDown(false)}>Accept Judgment</button>
        </div>
      )}

      <div className="container">
        {/* Header */}
        <div style={{padding:'20px 0 8px',textAlign:'center'}} className="fu">
          <h1 style={{fontFamily:'Orbitron',fontSize:18,fontWeight:900,color:'var(--cyan)',
            textTransform:'uppercase',letterSpacing:3,textShadow:'0 0 20px rgba(0,245,255,0.3)'}}>
            Hunter Progress System
          </h1>
          <p style={{fontFamily:'Share Tech Mono',fontSize:10,color:'var(--sub)',marginTop:4}}>
            {isCurrentWeek ? '📍 ACTIVE WEEK' : '📂 ARCHIVE'} • {getWeekRange(selectedWeek)}
          </p>
        </div>

        {/* Hunter ID Card — always visible in tracker tab */}
        {(view === 'tracker' || view === 'hunter') && <HunterIDCard/>}

        {/* XP Bar */}
        {(view === 'tracker' || view === 'hunter') && <XPBar/>}

        {/* Warning */}
        {view === 'tracker' && <WarningBanner/>}

        {/* Tabs */}
        <div className="tabs">
          {[
            {id:'tracker',label:'⚔️ Track'},
            {id:'hunter',label:'🏅 Hunter'},
            {id:'history',label:'⏳ History'},
            {id:'settings',label:'⚙️ Settings'},
          ].map(t=>(
            <button key={t.id} className={`tab ${view===t.id?'active':''}`}
              onClick={()=>{setView(t.id);if(t.id==='tracker')setSelectedWeek(CURRENT_WEEK);}}>
              {t.label}
            </button>
          ))}
        </div>

        {/* TRACKER VIEW */}
        {view === 'tracker' && (
          <>
            {/* Score Card */}
            <div className="score-card fu">
              <div className="left">
                <div className="label">Weekly Score</div>
                <div className="big">{overall.done}<span>/{overall.total}</span></div>
                {hunter.streak > 0 && <div className="streak">🔥 {hunter.streak} day streak</div>}
              </div>
              <CircleSVG pct={overall.pct} color={rank.color}/>
            </div>

            {/* Streak */}
            <StreakSection/>

            {/* Boss Fight */}
            <BossFight/>

            {/* Penalty Log */}
            <PenaltyLog/>

            {/* Categories */}
            {cats.map(cat=><CategoryCard key={cat.id} cat={cat}/>)}

            {/* Daily Log */}
            <DailyLog/>

            {/* Weekly Summary */}
            <WeeklySummary/>

            {/* Back to Current */}
            {!isCurrentWeek && (
              <button className="btn btn-primary" onClick={()=>setSelectedWeek(CURRENT_WEEK)}
                style={{width:'100%',marginTop:16}}>
                ← Back to Current Week
              </button>
            )}
          </>
        )}

        {/* HUNTER VIEW */}
        {view === 'hunter' && <HunterView/>}

        {/* HISTORY VIEW */}
        {view === 'history' && <HistoryView/>}

        {/* SETTINGS VIEW */}
        {view === 'settings' && <SettingsView/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
